<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>IT English Lab - 영어 학습 웹앱</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --bg-primary: #0f1117;
    --bg-secondary: #1a1d27;
    --bg-tertiary: #242736;
    --bg-hover: #2d3148;
    --border: #2e3347;
    --text-primary: #e8eaed;
    --text-secondary: #9aa0b0;
    --text-muted: #6b7280;
    --accent: #6c5ce7;
    --accent-hover: #7c6ff7;
    --accent-glow: rgba(108, 92, 231, 0.25);
    --danger: #e74c5c;
    --danger-hover: #f25d6d;
    --success: #2ecc71;
    --diff-add-bg: rgba(46, 204, 113, 0.12);
    --diff-add-border: rgba(46, 204, 113, 0.4);
    --diff-del-bg: rgba(231, 76, 92, 0.12);
    --diff-del-border: rgba(231, 76, 92, 0.4);
    --radius: 10px;
    --radius-sm: 6px;
    --transition: 0.2s ease;
  }

  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Noto Sans KR', sans-serif;
    background: var(--bg-primary);
    color: var(--text-primary);
    height: 100vh;
    overflow: hidden;
    display: flex;
    flex-direction: column;
  }

  /* ── Header ── */
  .header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 14px 28px;
    background: var(--bg-secondary);
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
  }
  .header-left { display: flex; align-items: center; gap: 12px; }
  .logo {
    width: 34px; height: 34px;
    background: var(--accent);
    border-radius: 8px;
    display: grid; place-items: center;
    font-weight: 800; font-size: 15px; color: #fff;
  }
  .header h1 { font-size: 17px; font-weight: 700; letter-spacing: -0.3px; }
  .header h1 span { color: var(--accent); }

  .btn-vocab {
    padding: 8px 18px;
    background: var(--bg-tertiary);
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    color: var(--text-primary);
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    transition: var(--transition);
    display: flex; align-items: center; gap: 6px;
  }
  .btn-vocab:hover { background: var(--bg-hover); border-color: var(--accent); }
  .btn-vocab svg { width: 16px; height: 16px; }

  /* ── Main Split ── */
  .main {
    display: flex;
    flex: 1;
    overflow: hidden;
  }

  .panel {
    width: 50%;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }
  .panel-left { border-right: 1px solid var(--border); }

  .panel-header {
    padding: 20px 28px 0;
    flex-shrink: 0;
  }
  .panel-title {
    font-size: 13px;
    font-weight: 600;
    color: var(--text-muted);
    text-transform: uppercase;
    letter-spacing: 1px;
    margin-bottom: 14px;
  }

  /* ── Tabs ── */
  .tabs {
    display: flex;
    gap: 4px;
    background: var(--bg-primary);
    border-radius: var(--radius-sm);
    padding: 3px;
    margin-bottom: 0;
  }
  .tab {
    flex: 1;
    padding: 10px 16px;
    background: transparent;
    border: none;
    border-radius: 5px;
    color: var(--text-secondary);
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    transition: var(--transition);
  }
  .tab:hover { color: var(--text-primary); }
  .tab.active {
    background: var(--accent);
    color: #fff;
    box-shadow: 0 2px 8px var(--accent-glow);
  }

  /* ── Article Content ── */
  .article-content {
    flex: 1;
    padding: 24px 28px;
    overflow-y: auto;
    line-height: 1.85;
    font-size: 15px;
    color: var(--text-primary);
  }
  .article-content p { margin-bottom: 18px; }
  .article-content::-webkit-scrollbar { width: 6px; }
  .article-content::-webkit-scrollbar-track { background: transparent; }
  .article-content::-webkit-scrollbar-thumb { background: var(--bg-hover); border-radius: 3px; }

  /* ── Right Panel ── */
  .editor-wrap {
    flex: 1;
    padding: 24px 28px;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }
  .editor {
    flex: 1;
    width: 100%;
    background: var(--bg-primary);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 18px 20px;
    color: var(--text-primary);
    font-size: 15px;
    line-height: 1.8;
    resize: none;
    font-family: inherit;
    transition: border-color var(--transition);
    min-height: 0;
  }
  .editor:focus { outline: none; border-color: var(--accent); box-shadow: 0 0 0 3px var(--accent-glow); }
  .editor::placeholder { color: var(--text-muted); }

  .btn-ai {
    margin-top: 16px;
    padding: 14px 28px;
    background: linear-gradient(135deg, var(--accent), #a366f7);
    border: none;
    border-radius: var(--radius);
    color: #fff;
    font-size: 15px;
    font-weight: 700;
    cursor: pointer;
    transition: var(--transition);
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    flex-shrink: 0;
  }
  .btn-ai:hover:not(:disabled) { transform: translateY(-1px); box-shadow: 0 6px 20px var(--accent-glow); }
  .btn-ai:disabled { opacity: 0.55; cursor: not-allowed; transform: none; }
  .btn-ai svg { width: 18px; height: 18px; }

  /* ── Loading ── */
  .loading-area {
    display: none;
    flex-direction: column;
    align-items: center;
    gap: 14px;
    padding: 28px 0;
    flex-shrink: 0;
  }
  .loading-area.show { display: flex; }

  .spinner {
    width: 36px; height: 36px;
    border: 3px solid var(--bg-hover);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  .loading-text { font-size: 14px; color: var(--text-secondary); font-weight: 500; }

  /* ── Diff Result ── */
  .diff-result {
    display: none;
    flex-direction: column;
    gap: 14px;
    margin-top: 16px;
    flex-shrink: 0;
    max-height: 320px;
    overflow-y: auto;
  }
  .diff-result.show { display: flex; }
  .diff-result::-webkit-scrollbar { width: 6px; }
  .diff-result::-webkit-scrollbar-track { background: transparent; }
  .diff-result::-webkit-scrollbar-thumb { background: var(--bg-hover); border-radius: 3px; }

  .diff-title {
    font-size: 14px;
    font-weight: 700;
    color: var(--accent);
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .diff-block {
    background: var(--bg-primary);
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    padding: 16px 18px;
    font-size: 14px;
    line-height: 1.9;
  }
  .diff-line-del {
    background: var(--diff-del-bg);
    border-left: 3px solid var(--diff-del-border);
    padding: 3px 10px;
    margin: 3px 0;
    border-radius: 3px;
    text-decoration: line-through;
    color: #e88;
  }
  .diff-line-add {
    background: var(--diff-add-bg);
    border-left: 3px solid var(--diff-add-border);
    padding: 3px 10px;
    margin: 3px 0;
    border-radius: 3px;
    color: #6fd89c;
  }
  .diff-comment {
    background: var(--bg-tertiary);
    border-left: 3px solid var(--accent);
    padding: 12px 16px;
    border-radius: 3px;
    font-size: 13px;
    color: var(--text-secondary);
    line-height: 1.7;
  }
  .diff-comment strong { color: var(--accent); }

  /* ── Tooltip ── */
  .tooltip {
    display: none;
    position: fixed;
    z-index: 1000;
    background: var(--bg-secondary);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 16px 18px;
    box-shadow: 0 12px 40px rgba(0,0,0,0.5);
    min-width: 240px;
    max-width: 320px;
  }
  .tooltip.show { display: block; }
  .tooltip-word { font-size: 17px; font-weight: 700; color: var(--accent); margin-bottom: 6px; }
  .tooltip-meaning { font-size: 13px; color: var(--text-secondary); margin-bottom: 4px; line-height: 1.5; }
  .tooltip-context { font-size: 12px; color: var(--text-muted); margin-bottom: 12px; line-height: 1.5; font-style: italic; }
  .tooltip-btn {
    width: 100%;
    padding: 9px 14px;
    background: var(--accent);
    border: none;
    border-radius: var(--radius-sm);
    color: #fff;
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    transition: var(--transition);
  }
  .tooltip-btn:hover { background: var(--accent-hover); }

  /* ── Modal ── */
  .modal-overlay {
    display: none;
    position: fixed;
    inset: 0;
    z-index: 2000;
    background: rgba(0,0,0,0.65);
    backdrop-filter: blur(4px);
    place-items: center;
  }
  .modal-overlay.show { display: grid; }

  .modal {
    background: var(--bg-secondary);
    border: 1px solid var(--border);
    border-radius: 14px;
    width: 560px;
    max-width: 92vw;
    max-height: 80vh;
    display: flex;
    flex-direction: column;
    box-shadow: 0 20px 60px rgba(0,0,0,0.5);
    animation: modalIn 0.25s ease;
  }
  @keyframes modalIn { from { opacity: 0; transform: translateY(16px) scale(0.97); } }

  .modal-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 20px 24px;
    border-bottom: 1px solid var(--border);
  }
  .modal-header h2 { font-size: 17px; font-weight: 700; }
  .modal-close {
    width: 32px; height: 32px;
    background: var(--bg-tertiary);
    border: none;
    border-radius: 8px;
    color: var(--text-secondary);
    font-size: 18px;
    cursor: pointer;
    display: grid; place-items: center;
    transition: var(--transition);
  }
  .modal-close:hover { background: var(--danger); color: #fff; }

  .modal-body {
    padding: 20px 24px;
    overflow-y: auto;
    flex: 1;
  }
  .modal-body::-webkit-scrollbar { width: 6px; }
  .modal-body::-webkit-scrollbar-thumb { background: var(--bg-hover); border-radius: 3px; }

  .vocab-empty {
    text-align: center;
    padding: 40px 0;
    color: var(--text-muted);
    font-size: 14px;
  }
  .vocab-item {
    display: flex;
    align-items: flex-start;
    gap: 14px;
    padding: 14px 0;
    border-bottom: 1px solid var(--border);
  }
  .vocab-item:last-child { border-bottom: none; }
  .vocab-info { flex: 1; }
  .vocab-word { font-size: 16px; font-weight: 700; color: var(--accent); margin-bottom: 4px; }
  .vocab-meaning { font-size: 13px; color: var(--text-secondary); margin-bottom: 3px; }
  .vocab-ctx { font-size: 12px; color: var(--text-muted); font-style: italic; line-height: 1.5; }
  .vocab-del {
    padding: 6px 12px;
    background: transparent;
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    color: var(--text-muted);
    font-size: 12px;
    cursor: pointer;
    transition: var(--transition);
    flex-shrink: 0;
    margin-top: 2px;
  }
  .vocab-del:hover { background: var(--danger); border-color: var(--danger); color: #fff; }

  /* ── Toast ── */
  .toast {
    position: fixed;
    bottom: 28px;
    left: 50%;
    transform: translateX(-50%) translateY(80px);
    background: var(--bg-tertiary);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 12px 22px;
    font-size: 13px;
    font-weight: 600;
    color: var(--text-primary);
    box-shadow: 0 8px 30px rgba(0,0,0,0.4);
    z-index: 3000;
    opacity: 0;
    transition: transform 0.35s ease, opacity 0.35s ease;
  }
  .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
</style>
</head>
<body>

<!-- Header -->
<header class="header">
  <div class="header-left">
    <div class="logo">iE</div>
    <h1><span>IT</span> English Lab</h1>
  </div>
  <button class="btn-vocab" id="btnOpenVocab" onclick="openVocabModal()">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 19.5A2.5 2.5 0 016.5 17H20"/><path d="M6.5 2H20v20H6.5A2.5 2.5 0 014 19.5v-15A2.5 2.5 0 016.5 2z"/><path d="M8 7h8M8 11h5"/></svg>
    단어장 보기
  </button>
</header>

<!-- Main Split View -->
<div class="main">

  <!-- Left Panel -->
  <div class="panel panel-left">
    <div class="panel-header">
      <div class="panel-title">오늘의 IT 아티클</div>
      <div class="tabs">
        <button class="tab active" data-tab="en" onclick="switchTab('en')">영문 아티클 원본</button>
        <button class="tab" data-tab="ko" onclick="switchTab('ko')">한글 번역본</button>
      </div>
    </div>
    <div class="article-content" id="articleContent"></div>
  </div>

  <!-- Right Panel -->
  <div class="panel panel-right">
    <div class="panel-header">
      <div class="panel-title" id="rightTitle">나의 번역</div>
    </div>
    <div class="editor-wrap">
      <textarea class="editor" id="userEditor" placeholder="이곳에 번역 또는 영작을 자유롭게 입력하세요..."></textarea>

      <div class="loading-area" id="loadingArea">
        <div class="spinner"></div>
        <div class="loading-text">AI 튜터가 분석 중입니다...</div>
      </div>

      <div class="diff-result" id="diffResult"></div>

      <button class="btn-ai" id="btnAi" onclick="requestAiCorrection()">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 2a4 4 0 014 4c0 1.95-1.4 3.58-3.25 3.93L12 22"/><path d="M8 6a4 4 0 00-4 4c0 1.95 1.4 3.58 3.25 3.93"/><circle cx="12" cy="6" r="1"/><circle cx="8" cy="10" r="1"/></svg>
        AI 교정 받기
      </button>
    </div>
  </div>
</div>

<!-- Tooltip -->
<div class="tooltip" id="tooltip">
  <div class="tooltip-word" id="tooltipWord"></div>
  <div class="tooltip-meaning" id="tooltipMeaning"></div>
  <div class="tooltip-context" id="tooltipContext"></div>
  <button class="tooltip-btn" onclick="addToVocab()">+ 단어장에 추가</button>
</div>

<!-- Vocabulary Modal -->
<div class="modal-overlay" id="vocabModal">
  <div class="modal">
    <div class="modal-header">
      <h2>나만의 단어장</h2>
      <button class="modal-close" onclick="closeVocabModal()">&times;</button>
    </div>
    <div class="modal-body" id="vocabList"></div>
  </div>
</div>

<!-- Toast -->
<div class="toast" id="toast"></div>

<script>
// ── Supabase ──
const SUPABASE_URL = "https://wwwwvdtuovcfsauekxrt.supabase.co";
const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Ind3d3d2ZHR1b3ZjZnNhdWVreHJ0Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzc4MTIxOTksImV4cCI6MjA5MzM4ODE5OX0.xYeW0i95Nidv6BTiF2DhIHXgykRPrMLLxdXK7AfclkU";

// ── State ──
let currentTab = 'en';
let selectedWord = '';
let selectedMeaning = '';
let selectedContext = '';

// ── Article Data ──
const articles = {
  en: [
    "Microservices architecture has become the de facto standard for building scalable cloud-native applications. By decomposing a monolithic system into loosely coupled services, engineering teams can deploy, scale, and iterate on individual components independently. However, this approach introduces new challenges in service discovery, distributed tracing, and data consistency across bounded contexts.",
    "Observability is no longer a luxury — it's a necessity. Modern SRE teams rely on the three pillars of observability: metrics, logs, and traces. Tools like Prometheus, Grafana, and OpenTelemetry have matured significantly, enabling teams to detect anomalies, correlate incidents, and reduce mean time to recovery (MTTR) from hours to minutes.",
    "The rise of large language models (LLMs) has fundamentally shifted how product teams think about user experience. From intelligent auto-complete to context-aware assistants, AI-powered features are no longer experimental — they are expected. Engineering leaders must now balance inference costs, latency budgets, and model accuracy when integrating LLM capabilities into production systems."

  ko: [

    "관측 가능성(Observability)은 더 이상 사치가 아니라 필수입니다. 현대의 SRE 팀은 관측 가능성의 세 가지 축인 메트릭, 로그, 트레이스에 의존합니다. Prometheus, Grafana, OpenTelemetry와 같은 도구들이 크게 성숙하여 팀이 이상 징후를 감지하고, 인시던트를 상관 분석하며, 평균 복구 시간(MTTR)을 수 시간에서 수 분으로 단축할 수 있게 되었습니다.",

// ── Fake Meanings ──
const fakeMeanings = {

function getFakeMeaning(word) {
  const lower = word.toLowerCase();
  if (fakeMeanings[lower]) return fakeMeanings[lower];
  if (fakeMeanings[word]) return fakeMeanings[word];
  const meanings = [
    "(명) 기술적 맥락에서 사용되는 전문 용어",
    "(동) 특정 작업을 수행하거나 실행하다",
    "(형) 시스템 또는 프로세스의 특성을 나타내는",
    "(명) IT 산업에서 널리 쓰이는 핵심 개념",
  ];
  return meanings[word.length % meanings.length];
}

// ── Render Article ──
function renderArticle() {
  const content = document.getElementById('articleContent');
  const paragraphs = articles[currentTab];
  content.innerHTML = paragraphs.map(p => `<p>${p}</p>`).join('');
}

// ── Tab Switch ──
function switchTab(tab) {
  currentTab = tab;
  document.querySelectorAll('.tab').forEach(t => t.classList.toggle('active', t.dataset.tab === tab));
  document.getElementById('rightTitle').textContent = tab === 'en' ? '나의 번역' : '나의 영작';
  document.getElementById('userEditor').placeholder = tab === 'en'
    ? '영문 아티클을 읽고, 한국어로 번역해 보세요...'
    : '한글 번역본을 읽고, 영어로 영작해 보세요...';
  renderArticle();
  hideTooltip();
  hideDiffResult();
}

// ── Tooltip ──
function hideTooltip() { document.getElementById('tooltip').classList.remove('show'); }

document.getElementById('articleContent').addEventListener('dblclick', function(e) {
  const sel = window.getSelection();
  const word = sel.toString().trim();
  if (!word || word.includes(' ')) return;

  selectedWord = word;

  const range = sel.getRangeAt(0);
  let contextNode = range.startContainer;
  while (contextNode && contextNode.nodeName !== 'P') contextNode = contextNode.parentNode;
  selectedContext = contextNode ? contextNode.textContent.substring(0, 120) + '...' : '';

  selectedMeaning = getFakeMeaning(word);

  const rect = range.getBoundingClientRect();
  const tip = document.getElementById('tooltip');
  document.getElementById('tooltipWord').textContent = word;
  document.getElementById('tooltipMeaning').textContent = selectedMeaning;
  document.getElementById('tooltipContext').textContent = `"${selectedContext}"`;

  let left = rect.left + rect.width / 2 - 130;
  let top = rect.bottom + 10;
  if (left < 10) left = 10;
  if (top + 200 > window.innerHeight) top = rect.top - 180;
  tip.style.left = left + 'px';
  tip.style.top = top + 'px';
  tip.classList.add('show');
});

document.addEventListener('click', function(e) {
  if (!e.target.closest('.tooltip') && !window.getSelection().toString().trim()) {
    hideTooltip();
  }
});

// ── Add to Vocab ──
async function addToVocab() {
  hideTooltip();
  try {
    const { error } = await sb.from('vocabulary').insert({
      word: selectedWord,
      meaning: selectedMeaning,
      context: selectedContext
    });
    if (error) {
      showToast('저장 실패: ' + error.message);
    } else {
      showToast(`"${selectedWord}" 단어가 단어장에 추가되었습니다.`);
    }
  } catch (e) {
    showToast('서버 연결 실패 — Supabase 프로젝트가 활성 상태인지 확인해 주세요.');
    console.error('addToVocab network error:', e);
  }
}

// ── Vocab Modal ──
async function openVocabModal() {
  document.getElementById('vocabModal').classList.add('show');
  await loadVocab();
}
function closeVocabModal() {
  document.getElementById('vocabModal').classList.remove('show');
}
document.getElementById('vocabModal').addEventListener('click', function(e) {
  if (e.target === this) closeVocabModal();
});

async function loadVocab() {
  const list = document.getElementById('vocabList');
  list.innerHTML = '<div class="vocab-empty">불러오는 중...</div>';

  let data, error;
  try {
    ({ data, error } = await sb.from('vocabulary').select('*').order('created_at', { ascending: false }));
  } catch (e) {
    list.innerHTML = '<div class="vocab-empty">서버에 연결할 수 없습니다.<br>Supabase 프로젝트가 활성 상태인지 확인해 주세요.</div>';
    console.error('loadVocab network error:', e);
    return;
  }

  if (error) {
    list.innerHTML = `<div class="vocab-empty">조회 실패: ${error.message}</div>`;
    return;
  }
  if (!data || data.length === 0) {
    list.innerHTML = '<div class="vocab-empty">저장된 단어가 없습니다.<br>아티클에서 단어를 더블 클릭하여 추가해 보세요.</div>';
    return;
  }

  list.innerHTML = data.map(item => `
    <div class="vocab-item">
      <div class="vocab-info">
        <div class="vocab-word">${escapeHtml(item.word)}</div>
        <div class="vocab-meaning">${escapeHtml(item.meaning)}</div>
        ${item.context ? `<div class="vocab-ctx">${escapeHtml(item.context)}</div>` : ''}
      </div>
      <button class="vocab-del" onclick="deleteVocab(${item.id})">삭제</button>
    </div>
  `).join('');
}

async function deleteVocab(id) {
  try {
    const { error } = await sb.from('vocabulary').delete().eq('id', id);
    if (error) {
      showToast('삭제 실패: ' + error.message);
    } else {
      showToast('단어가 삭제되었습니다.');
      await loadVocab();
    }
  } catch (e) {
    showToast('서버 연결 실패 — Supabase 프로젝트가 활성 상태인지 확인해 주세요.');
    console.error('deleteVocab network error:', e);
  }
}

// ── AI Correction (Mock) ──
const mockResults = {
  en: {
    original: "The microservice architecture is become standard for build scalable application. Team can deploy and scale component independently.",
    corrected: "Microservices architecture has become the standard for building scalable applications. Teams can deploy and scale components independently.",
    comments: [
      { type: 'grammar', text: '<strong>관사 & 복수형:</strong> "The microservice" → "Microservices" — 일반적인 개념을 지칭할 때는 무관사 복수형을 사용합니다.' },
      { type: 'grammar', text: '<strong>시제 오류:</strong> "is become" → "has become" — 현재완료 시제로 과거부터 현재까지의 상태 변화를 표현합니다.' },
      { type: 'grammar', text: '<strong>동명사:</strong> "for build" → "for building" — 전치사 뒤에는 동명사(V-ing)를 사용합니다.' },
      { type: 'style', text: '<strong>주어-동사 수 일치:</strong> "Team can" → "Teams can" — 복수 주어와 동사를 일치시킵니다.' },
    ]
  },
  ko: {
    original: "Observability is not luxury anymore. Modern SRE team rely on three pillar of observability.",
    corrected: "Observability is no longer a luxury. Modern SRE teams rely on the three pillars of observability.",
    comments: [
      { type: 'grammar', text: '<strong>관사:</strong> "not luxury" → "no longer a luxury" — 불가산/가산 명사 구분에 주의하고, "no longer"가 더 자연스러운 표현입니다.' },
      { type: 'grammar', text: '<strong>복수형:</strong> "three pillar" → "three pillars" — 수사 뒤 명사는 복수형을 사용합니다.' },
      { type: 'style', text: '<strong>정관사:</strong> "on three pillars" → "on the three pillars" — 잘 알려진 특정 개념을 지칭할 때 정관사 the를 사용합니다.' },
    ]
  }
};

function hideDiffResult() {
  document.getElementById('diffResult').classList.remove('show');
  document.getElementById('diffResult').innerHTML = '';
}

function requestAiCorrection() {
  const editor = document.getElementById('userEditor');
  if (!editor.value.trim()) {
    showToast('먼저 텍스트를 입력해 주세요.');
    return;
  }

  const btn = document.getElementById('btnAi');
  const loading = document.getElementById('loadingArea');
  const diff = document.getElementById('diffResult');

  btn.disabled = true;
  diff.classList.remove('show');
  diff.innerHTML = '';
  loading.classList.add('show');

  setTimeout(() => {
    loading.classList.remove('show');

    const mock = currentTab === 'en' ? mockResults.en : mockResults.ko;

    diff.innerHTML = `
      <div class="diff-title">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 20h9"/><path d="M16.5 3.5a2.121 2.121 0 013 3L7 19l-4 1 1-4L16.5 3.5z"/></svg>
        AI 교정 결과
      </div>
      <div class="diff-block">
        <div class="diff-line-del">− ${escapeHtml(mock.original)}</div>
        <div class="diff-line-add">+ ${escapeHtml(mock.corrected)}</div>
      </div>
      ${mock.comments.map(c => `<div class="diff-comment">${c.text}</div>`).join('')}
    `;
    diff.classList.add('show');
    btn.disabled = false;
  }, 2500);
}

// ── Utils ──
function escapeHtml(str) {
  const d = document.createElement('div');
  d.textContent = str;
  return d.innerHTML;
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2500);
}

// ── Init ──
renderArticle();
</script>
