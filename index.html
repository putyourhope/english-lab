<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>IEL</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  *, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }
  :root {
    --bg-body:#f5f6f8; --bg-white:#ffffff; --bg-hover:#edeef1;
    --border:#e2e4e9; --text-primary:#1a1d27; --text-secondary:#5a5f72;
    --text-muted:#9298a8;
    --accent:#10b981; --accent-hover:#059669;
    --accent-glow:rgba(16,185,129,0.15); --accent-light:#ecfdf5;
    --danger:#e74c5c; --success:#2ecc71;
    --diff-add-bg:rgba(16,185,129,0.10); --diff-add-border:#10b981;
    --diff-del-bg:rgba(231,76,92,0.08); --diff-del-border:#e74c5c;
    --radius:10px; --radius-sm:6px;
    --shadow-sm:0 1px 3px rgba(0,0,0,0.06); --shadow-md:0 4px 16px rgba(0,0,0,0.08);
    --shadow-lg:0 12px 40px rgba(0,0,0,0.12); --transition:0.2s ease;
  }
  body {
    font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,'Noto Sans KR',sans-serif;
    background:var(--bg-body); color:var(--text-primary);
    height:100vh; overflow:hidden; display:flex; flex-direction:column;
  }

  /* ── Loading Screen ── */
  .loading-screen {
    position:fixed; inset:0; z-index:9999; background:var(--bg-white);
    display:grid; place-items:center;
  }
  .loading-screen.hide { display:none; }
  .loading-content { text-align:center; }
  .loading-logo {
    width:56px; height:56px; background:var(--accent); border-radius:14px;
    display:grid; place-items:center; font-weight:800; font-size:18px;
    color:#fff; letter-spacing:-0.5px; margin:0 auto 24px;
  }
  .loading-dots { display:flex; gap:6px; justify-content:center; }
  .loading-dots span {
    width:8px; height:8px; border-radius:50%; background:var(--accent);
    animation:ldot 1.2s ease infinite;
  }
  .loading-dots span:nth-child(2) { animation-delay:0.15s; }
  .loading-dots span:nth-child(3) { animation-delay:0.3s; }
  @keyframes ldot { 0%,80%,100%{opacity:0.2;transform:scale(0.8)} 40%{opacity:1;transform:scale(1.1)} }

  /* ── Header ── */
  .header {
    display:flex; align-items:center; justify-content:space-between;
    padding:10px 20px; background:var(--bg-white);
    border-bottom:1px solid var(--border); flex-shrink:0;
  }
  .header-left { display:flex; align-items:center; gap:10px; }
  .logo {
    width:30px; height:30px; background:var(--accent); border-radius:8px;
    display:grid; place-items:center; font-weight:800; font-size:11px;
    color:#fff; letter-spacing:-0.5px;
  }
  .header h1 { font-size:15px; font-weight:700; letter-spacing:-0.3px; }
  .btn-icon {
    width:36px; height:36px; background:var(--bg-white); border:1px solid var(--border);
    border-radius:var(--radius-sm); color:var(--text-secondary);
    cursor:pointer; transition:var(--transition); display:grid; place-items:center;
  }
  .btn-icon:hover { border-color:var(--accent); color:var(--accent); background:var(--accent-light); }
  .btn-icon svg { width:18px; height:18px; }

  /* ── Layout ── */
  .layout { display:flex; flex:1; overflow:hidden; }
  .sidebar {
    width:180px; background:var(--bg-white); border-right:1px solid var(--border);
    display:flex; flex-direction:column; padding:8px 6px; gap:2px;
    overflow-y:auto; flex-shrink:0;
  }
  .sidebar::-webkit-scrollbar { width:0; }
  .sidebar-item {
    width:100%; display:flex; align-items:center; gap:8px;
    padding:9px 10px; border-radius:var(--radius-sm); border:none;
    background:transparent; color:var(--text-secondary); font-size:12px;
    font-weight:500; cursor:pointer; transition:var(--transition);
    text-align:left; line-height:1.3;
  }
  .sidebar-item:hover { background:var(--bg-hover); color:var(--text-primary); }
  .sidebar-item.active { background:var(--accent); color:#fff; box-shadow:0 2px 8px var(--accent-glow); }
  .sidebar-num {
    width:22px; height:22px; border-radius:50%; font-size:10px; font-weight:700;
    display:grid; place-items:center; flex-shrink:0;
    background:var(--accent-light); color:var(--accent);
  }
  .sidebar-item.active .sidebar-num { background:rgba(255,255,255,0.25); color:#fff; }
  .sidebar-title {
    flex:1; overflow:hidden; text-overflow:ellipsis; white-space:nowrap;
  }

  .main { display:flex; flex:1; overflow:hidden; }
  .panel { width:50%; display:flex; flex-direction:column; overflow:hidden; }
  .panel-left { border-right:1px solid var(--border); background:var(--bg-white); }
  .panel-right { background:var(--bg-body); }
  .panel-header { padding:14px 24px 0; flex-shrink:0; }
  .tabs { display:flex; gap:4px; background:var(--bg-body); border-radius:var(--radius-sm); padding:3px; }
  .tab {
    flex:1; padding:8px 14px; background:transparent; border:none;
    border-radius:5px; color:var(--text-muted); font-size:13px;
    font-weight:600; cursor:pointer; transition:var(--transition);
  }
  .tab:hover { color:var(--text-primary); }
  .tab.active { background:var(--accent); color:#fff; box-shadow:0 2px 8px var(--accent-glow); }
  .meta-box {
    margin:12px 24px 0; padding:14px 18px; background:var(--bg-body);
    border:1px solid var(--border); border-radius:var(--radius); flex-shrink:0;
  }
  .meta-title { font-size:15px; font-weight:700; line-height:1.4; margin-bottom:6px; }
  .meta-summary { font-size:12.5px; color:var(--text-secondary); line-height:1.6; margin-bottom:8px; }
  .meta-tags { display:flex; flex-wrap:wrap; gap:6px; align-items:center; }
  .meta-tag {
    display:inline-flex; align-items:center; gap:4px; padding:3px 9px;
    background:var(--bg-white); border:1px solid var(--border); border-radius:20px;
    font-size:11px; color:var(--text-secondary); font-weight:500; white-space:nowrap;
  }
  .meta-tag.difficulty { border-color:var(--accent); color:var(--accent); font-weight:600; }
  .meta-tag a { color:var(--accent); text-decoration:none; font-weight:600; }
  .meta-tag a:hover { text-decoration:underline; }
  .article-content {
    flex:1; padding:12px 24px 24px; overflow-y:auto; line-height:1.9; font-size:14.5px;
  }
  .article-content p { margin-bottom:14px; }
  .article-content::-webkit-scrollbar { width:4px; }
  .article-content::-webkit-scrollbar-track { background:transparent; }
  .article-content::-webkit-scrollbar-thumb { background:var(--border); border-radius:3px; }

  /* ── Right: Sentence List ── */
  .sentence-list {
    flex:1; padding:14px 20px; overflow-y:auto;
    display:flex; flex-direction:column; gap:14px;
  }
  .sentence-list::-webkit-scrollbar { width:4px; }
  .sentence-list::-webkit-scrollbar-thumb { background:var(--border); border-radius:3px; }
  .s-block {
    background:var(--bg-white); border:1px solid var(--border);
    border-radius:var(--radius); padding:12px 14px; box-shadow:var(--shadow-sm);
  }
  .s-num {
    display:inline-block; width:20px; height:20px; border-radius:50%;
    background:var(--accent-light); color:var(--accent); font-size:10px;
    font-weight:700; text-align:center; line-height:20px; margin-right:6px; flex-shrink:0;
  }
  .s-source { font-size:13.5px; line-height:1.7; color:var(--text-primary); margin-bottom:8px; }
  .s-input-row { display:flex; gap:6px; align-items:flex-start; }
  .s-input {
    flex:1; padding:9px 12px; border:1.5px solid var(--border);
    border-radius:var(--radius-sm); font-size:13px; font-family:inherit;
    line-height:1.6; color:var(--text-primary); background:var(--bg-body);
    resize:none; min-height:40px; max-height:80px;
    transition:border-color var(--transition), box-shadow var(--transition);
  }
  .s-input:focus { outline:none; border-color:var(--accent); box-shadow:0 0 0 3px var(--accent-glow); }
  .s-input::placeholder { color:var(--text-muted); }
  .s-btn {
    width:40px; height:40px; background:transparent; border:1.5px solid var(--accent);
    border-radius:var(--radius-sm); color:var(--accent); cursor:pointer;
    transition:var(--transition); flex-shrink:0;
    display:grid; place-items:center;
  }
  .s-btn:hover:not(:disabled) { background:var(--accent-light); border-color:var(--accent-hover); color:var(--accent-hover); }
  .s-btn:disabled { opacity:0.4; cursor:not-allowed; }
  .s-btn svg { width:18px; height:18px; }

  .s-loading {
    display:none; align-items:center; gap:8px;
    padding:8px 0 2px; font-size:12px; color:var(--text-muted);
  }
  .s-loading.show { display:flex; }
  .s-spinner {
    width:14px; height:14px; border:2px solid var(--border);
    border-top-color:var(--accent); border-radius:50%;
    animation:spin 0.8s linear infinite;
  }
  @keyframes spin { to { transform:rotate(360deg); } }

  .s-result { display:none; margin-top:8px; }
  .s-result.show { display:block; }
  .s-diff {
    background:var(--bg-body); border:1px solid var(--border);
    border-radius:var(--radius-sm); padding:8px 12px;
    font-size:12.5px; line-height:1.8; margin-bottom:6px;
  }
  .s-diff-del {
    background:var(--diff-del-bg); border-left:3px solid var(--diff-del-border);
    padding:2px 8px; margin:2px 0; border-radius:3px;
    text-decoration:line-through; color:#c0392b; font-size:12px;
  }
  .s-diff-add {
    background:var(--diff-add-bg); border-left:3px solid var(--diff-add-border);
    padding:2px 8px; margin:2px 0; border-radius:3px;
    color:#065f46; font-size:12px;
  }
  .s-comment {
    background:#fffbeb; border-left:3px solid #f59e0b;
    padding:6px 10px; border-radius:3px; margin-bottom:4px;
    font-size:12px; line-height:1.6; color:var(--text-secondary);
  }
  .s-comment-icon { font-weight:700; color:#d97706; margin-right:4px; }
  .s-no-feedback {
    background:var(--accent-light); border-left:3px solid var(--accent);
    padding:8px 12px; border-radius:3px; font-size:12px;
    color:var(--text-secondary); line-height:1.6;
  }

  /* ── Tooltip ── */
  .tooltip {
    display:none; position:fixed; z-index:1000; background:var(--bg-white);
    border:1px solid var(--border); border-radius:var(--radius);
    padding:14px 16px; box-shadow:var(--shadow-lg); min-width:220px; max-width:280px;
  }
  .tooltip.show { display:block; }
  .tooltip-word { font-size:15px; font-weight:700; color:var(--accent); margin-bottom:4px; }
  .tooltip-meaning { font-size:13px; color:var(--text-secondary); margin-bottom:4px; line-height:1.5; }
  .tooltip-context { font-size:11px; color:var(--text-muted); margin-bottom:10px; line-height:1.5; font-style:italic; }
  .tooltip-btn {
    width:100%; padding:7px 12px; background:var(--accent); border:none;
    border-radius:var(--radius-sm); color:#fff; font-size:12px;
    font-weight:600; cursor:pointer; transition:var(--transition);
  }
  .tooltip-btn:hover { background:var(--accent-hover); }

  /* ── Modal ── */
  .modal-overlay {
    display:none; position:fixed; inset:0; z-index:2000;
    background:rgba(0,0,0,0.3); backdrop-filter:blur(4px); place-items:center;
  }
  .modal-overlay.show { display:grid; }
  .modal {
    background:var(--bg-white); border:1px solid var(--border); border-radius:14px;
    width:520px; max-width:92vw; max-height:80vh;
    display:flex; flex-direction:column; box-shadow:var(--shadow-lg);
    animation:modalIn 0.25s ease;
  }
  @keyframes modalIn { from { opacity:0; transform:translateY(14px) scale(0.97); } }
  .modal-header {
    display:flex; align-items:center; justify-content:space-between;
    padding:16px 20px; border-bottom:1px solid var(--border);
  }
  .modal-header h2 { font-size:15px; font-weight:700; }
  .modal-close {
    width:28px; height:28px; background:var(--bg-body); border:none;
    border-radius:8px; color:var(--text-secondary); font-size:16px;
    cursor:pointer; display:grid; place-items:center; transition:var(--transition);
  }
  .modal-close:hover { background:var(--danger); color:#fff; }
  .modal-body { padding:16px 20px; overflow-y:auto; flex:1; }
  .modal-body::-webkit-scrollbar { width:4px; }
  .modal-body::-webkit-scrollbar-thumb { background:var(--border); border-radius:3px; }
  .vocab-empty { text-align:center; padding:32px 0; color:var(--text-muted); font-size:13px; }
  .vocab-item {
    display:flex; align-items:flex-start; gap:12px; padding:10px 0;
    border-bottom:1px solid var(--border);
  }
  .vocab-item:last-child { border-bottom:none; }
  .vocab-info { flex:1; }
  .vocab-word { font-size:14px; font-weight:700; color:var(--accent); margin-bottom:2px; }
  .vocab-meaning { font-size:12.5px; color:var(--text-secondary); margin-bottom:2px; }
  .vocab-ctx { font-size:11px; color:var(--text-muted); font-style:italic; line-height:1.5; }
  .vocab-del {
    padding:4px 10px; background:transparent; border:1px solid var(--border);
    border-radius:var(--radius-sm); color:var(--text-muted); font-size:11px;
    cursor:pointer; transition:var(--transition); flex-shrink:0; margin-top:2px;
  }
  .vocab-del:hover { background:var(--danger); border-color:var(--danger); color:#fff; }
  .toast {
    position:fixed; bottom:24px; left:50%;
    transform:translateX(-50%) translateY(70px);
    background:var(--text-primary); border-radius:var(--radius);
    padding:10px 20px; font-size:13px; font-weight:600; color:#fff;
    box-shadow:var(--shadow-md); z-index:3000; opacity:0;
    transition:transform 0.35s ease, opacity 0.35s ease;
  }
  .toast.show { opacity:1; transform:translateX(-50%) translateY(0); }
</style>
</head>

<!-- Loading Screen -->
<div class="loading-screen" id="loadingScreen">
  <div class="loading-content">
    <div class="loading-logo">IEL</div>
    <div class="loading-dots"><span></span><span></span><span></span></div>
  </div>
</div>

<!-- Header -->
<header class="header" id="appHeader" style="display:none">
  <div class="header-left">

<script>
// ── Supabase ──
const SUPABASE_URL = "https://wwwwvdtuovcfsauekxrt.supabase.co";
const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Ind3d3d2ZHR1b3ZjZnNhdWVreHJ0Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzc4MTIxOTksImV4cCI6MjA5MzM4ODE5OX0.xYeW0i95Nidv6BTiF2DhIHXgykRPrMLLxdXK7AfclkU";

// ── State ──
let articles = [];
let currentTab = 'en', currentDay = 0;
let selectedWord = '', selectedMeaning = '', selectedContext = '';

// ── State Persistence ──
const store = { inputs:{}, results:{} };

function loadStore() {
  try {
    const s = sessionStorage.getItem('iel');
    if (s) { const p = JSON.parse(s); Object.assign(store.inputs, p.inputs||{}); Object.assign(store.results, p.results||{}); }
  } catch(e){}
}
function saveStore() {
  try { sessionStorage.setItem('iel', JSON.stringify(store)); } catch(e){}
}
function sk(d,t,i) { return d+'_'+t+'_'+i; }
function onInput(idx, val) { store.inputs[sk(currentDay,currentTab,idx)] = val; saveStore(); }
function getInput(d,t,i) { return store.inputs[sk(d,t,i)] || ''; }
function saveResult(d,t,i,html) { store.results[sk(d,t,i)] = html; saveStore(); }
function getResult(d,t,i) { return store.results[sk(d,t,i)] || ''; }

// ── Mock Article Data ──

  {

    difficulty:6, sourceName:"The Verge", sourceUrl:"https://www.theverge.com/2024/3/15/remote-work-silicon-valley-hybrid-revolution", date:"2025-03-15",
    content:[
      {en:"The pandemic fundamentally reshaped how Silicon Valley thinks about office work.", ko:"팬데믹은 실리콘밸리가 사무실 근무를 바라보는 시각을 근본적으로 바꾸어 놓았습니다.",
        feedback_en_to_ko:{ideal:"팬데믹은 실리콘밸리가 사무실 근무에 대해 생각하는 방식을 근본적으로 바꿔 놓았습니다.", comments:["'thinks about'는 '~을 바라보는 시각'보다 '~에 대해 생각하는 방식'이 원문의 뉘앙스에 더 가깝습니다.","'reshaped'는 단순히 '바꾸다'보다 '재편하다, 새롭게 형성하다'라는 의미가 강합니다."]},
        feedback_ko_to_en:{ideal:"The pandemic has fundamentally reshaped how Silicon Valley views office work.", comments:["'근본적으로 바꾸어 놓았습니다'는 결과가 현재까지 이어지므로 현재완료(has reshaped)가 더 적절합니다.","'바라보는 시각' → 'views'가 'thinks about'보다 간결하고 자연스럽습니다."]}},
      {en:"What started as a temporary measure has evolved into a permanent shift, with companies like Airbnb and Spotify adopting 'work from anywhere' policies.", ko:"일시적 조치로 시작된 것이 영구적 변화로 진화하여, 에어비앤비와 스포티파이 같은 기업들은 '어디서든 근무' 정책을 도입했습니다.",
        feedback_en_to_ko:{ideal:"일시적 조치로 시작된 것이 영구적 전환으로 발전했으며, 에어비앤비와 스포티파이 같은 기업들이 '어디서든 근무' 정책을 채택했습니다.", comments:["'evolved into'는 '진화하다'보다 '발전하다/전환되다'가 비즈니스 맥락에 자연스럽습니다.","'shift'는 '변화'보다 '전환'이 갑작스러운 방향 전환의 뉘앙스를 더 잘 살립니다."]},
        feedback_ko_to_en:{ideal:"What began as a temporary measure has evolved into a permanent shift, with companies like Airbnb and Spotify adopting 'work from anywhere' policies.", comments:["'시작된'은 'started' 대신 'began'을 사용하면 문어체에서 더 격식 있는 표현이 됩니다.","분사구문 'with + 명사 + V-ing' 구조를 정확히 살려야 합니다."]}},
      {en:"Even firms that initially resisted, such as Google and Apple, have settled on hybrid models that give employees more flexibility than ever before.", ko:"처음에는 반대했던 구글과 애플마저도 직원들에게 이전보다 훨씬 큰 유연성을 부여하는 하이브리드 모델을 정착시켰습니다.",
        feedback_en_to_ko:{ideal:"처음에 저항했던 구글, 애플 같은 기업들까지도 직원들에게 이전보다 더 큰 유연성을 제공하는 하이브리드 모델에 안착했습니다.", comments:["'settled on'은 '정착시키다(타동사)'보다 '안착하다/채택하다'가 원문(자동사)에 가깝습니다.","'resisted'는 '반대하다'보다 '저항하다'가 적극적 거부 뉘앙스를 더 잘 전달합니다."]},
        feedback_ko_to_en:{ideal:"Even firms that initially resisted, such as Google and Apple, have settled on hybrid models that offer employees greater flexibility than ever before.", comments:["'유연성을 부여하는'은 'give flexibility'보다 'offer greater flexibility'가 더 격식체입니다.","'이전보다 훨씬'은 'much more than' 대신 'greater ~ than ever before'로 간결하게 표현할 수 있습니다."]}},
      {en:"Proponents argue that remote work boosts productivity by eliminating long commutes and reducing open-office distractions.", ko:"재택근무 지지자들은 긴 통근을 없애고 개방형 사무실의 방해 요소를 줄여 생산성을 높인다고 주장합니다.",
        feedback_en_to_ko:{ideal:"지지자들은 재택근무가 긴 통근을 없애고 개방형 사무실의 산만함을 줄임으로써 생산성을 높인다고 주장합니다.", comments:["'by + V-ing' 구문은 '~함으로써'로 번역하면 수단/방법의 뉘앙스가 명확해집니다.","'distractions'는 '방해 요소'도 좋지만 '산만함/집중 저해 요인'이 더 구체적입니다."]},
        feedback_ko_to_en:{ideal:"Proponents argue that remote work boosts productivity by eliminating lengthy commutes and reducing open-office distractions.", comments:["'긴 통근'은 'long commutes' 대신 'lengthy commutes'를 쓰면 더 formal한 어감이 됩니다.","'주장합니다' → 'argue that'은 정확합니다. 'insist'는 너무 강하고 'claim'은 의심의 뉘앙스가 있으므로 'argue'가 적절합니다."]}},
      {en:"Studies from Stanford show that remote workers are roughly 13 percent more productive.", ko:"스탠퍼드 대학의 연구에 따르면 원격 근무자는 대략 13% 더 생산적입니다.",
        feedback_en_to_ko:{ideal:"스탠퍼드 대학교의 연구에 따르면 원격 근무자의 생산성이 약 13% 더 높은 것으로 나타났습니다.", comments:["'show that'은 '~인 것으로 나타났다'로 번역하면 연구 결과 보고의 뉘앙스가 살아납니다.","'더 생산적이다'보다 '생산성이 더 높다'가 한국어에서 더 자연스러운 표현입니다."]},
        feedback_ko_to_en:{ideal:"Research from Stanford indicates that remote workers are approximately 13 percent more productive.", comments:["'연구에 따르면'은 'Studies show' 대신 'Research indicates'를 사용하면 더 학술적인 어감입니다.","'대략'은 'roughly'도 맞지만 'approximately'가 formal writing에 더 적합합니다."]}},
      {en:"However, critics warn about the erosion of spontaneous collaboration — the hallway conversations and whiteboard sessions that often spark breakthrough ideas.", ko:"하지만 비판론자들은 복도에서의 즉흥적 대화나 화이트보드 세션처럼 혁신적 아이디어를 촉발하는 자발적 협업이 약화될 수 있다고 경고합니다.",
        feedback_en_to_ko:{ideal:"그러나 비판론자들은 복도 대화나 화이트보드 세션처럼 혁신적인 아이디어를 촉발하곤 하는 자발적 협업의 약화를 경고합니다.", comments:["'erosion of'는 '약화될 수 있다'보다 '약화(침식)'로 명사형을 유지하면 원문 구조에 충실합니다.","대시(—) 뒤의 구문은 'spontaneous collaboration'을 부연 설명하는 동격입니다."]},
        feedback_ko_to_en:{ideal:"However, critics warn about the erosion of spontaneous collaboration — the hallway conversations and whiteboard sessions that often spark breakthrough ideas.", comments:["'자발적 협업이 약화될 수 있다고 경고'에서 'erosion of + 명사' 패턴을 사용하면 더 간결합니다.","'혁신적 아이디어를 촉발하는'은 'that spark breakthrough ideas'로 관계절을 활용합니다."]}},
      {en:"The ripple effects extend far beyond tech.", ko:"이 파급 효과는 기술 산업을 훨씬 넘어섭니다.",
        feedback_en_to_ko:{ideal:"그 파급 효과는 기술 산업을 훨씬 넘어선다.", comments:["짧은 문장이므로 간결하게 번역하는 것이 좋습니다.","'이'보다 '그'가 앞 문맥을 받는 지시대명사로 더 자연스럽습니다."]},
        feedback_ko_to_en:{ideal:"The ripple effects extend far beyond the tech industry.", comments:["'기술 산업'은 단순히 'tech'보다 'the tech industry'가 더 명확합니다.","'훨씬 넘어서다'는 'extend far beyond'로 정확히 대응됩니다."]}},
      {en:"Commercial real estate in San Francisco has seen vacancy rates climb above 30 percent, while smaller cities like Austin and Boise have experienced population booms.", ko:"샌프란시스코의 상업용 부동산 공실률은 30%를 넘어섰고, 오스틴이나 보이시 같은 중소도시들은 인구 급증을 경험하고 있습니다.",
        feedback_en_to_ko:{ideal:"샌프란시스코의 상업용 부동산 공실률이 30%를 넘어선 반면, 오스틴이나 보이시 같은 소도시들은 인구 급증을 겪고 있습니다.", comments:["'while'은 대조를 나타내므로 '~한 반면'으로 번역하면 두 도시의 대비가 명확해집니다.","'smaller cities'는 '중소도시'보다 '소도시'가 실리콘밸리와의 대비에서 더 정확합니다."]},
        feedback_ko_to_en:{ideal:"Commercial real estate in San Francisco has seen vacancy rates climb above 30 percent, while smaller cities like Austin and Boise have experienced population booms.", comments:["'공실률이 30%를 넘어섰다'는 'has seen vacancy rates climb above 30%'처럼 지각동사 구문을 활용하세요.","'while'을 사용하여 두 현상의 대조를 표현합니다."]}},
      {en:"The remote work revolution is not just changing where people work — it's reshaping entire regional economies.", ko:"재택근무 혁명은 단순히 사람들이 어디서 일하는지를 바꾸는 것이 아니라, 지역 경제 전체를 재편하고 있습니다.",
        feedback_en_to_ko:{ideal:"재택근무 혁명은 단순히 사람들의 근무 장소만 바꾸는 것이 아니라, 지역 경제 전체를 재편하고 있습니다.", comments:["'where people work'은 '어디서 일하는지'보다 '근무 장소'로 의역하면 더 깔끔합니다.","'not just A — B' 패턴은 '단순히 A만이 아니라 B'로 대응됩니다."]},
        feedback_ko_to_en:{ideal:"The remote work revolution is not merely changing where people work — it is reshaping entire regional economies.", comments:["'단순히'는 'just' 대신 'merely'를 쓰면 글의 격이 올라갑니다.","대시(—) 뒤에서 'it's' 대신 'it is'를 쓰면 강조 효과가 커집니다."]}}
    ]
  },
  {
    id:2, title:"뽀모도로 기법의 효과",
    summary:"25분 집중 + 5분 휴식 사이클의 뽀모도로 기법을 신경과학 관점에서 분석합니다.",
    difficulty:5, sourceName:"Harvard Business Review", sourceUrl:"https://hbr.org/2024/02/the-science-behind-the-pomodoro-technique", date:"2025-02-20",
    content:[
      {en:"The Pomodoro Technique, developed by Francesco Cirillo in the late 1980s, is deceptively simple: work for 25 minutes, take a 5-minute break, and repeat.", ko:"1980년대 후반 프란체스코 시릴로가 개발한 뽀모도로 기법은 놀라울 정도로 단순합니다. 25분간 작업하고 5분 휴식을 취한 뒤 이를 반복합니다.",
        feedback_en_to_ko:{ideal:"1980년대 후반 프란체스코 시릴로가 개발한 뽀모도로 기법은 기만적일 만큼 단순합니다: 25분간 작업하고, 5분 휴식한 뒤, 반복합니다.", comments:["'deceptively simple'은 '놀라울 정도로 단순'보다 '겉보기에 단순해 보이지만 실은 효과적'이라는 뉘앙스입니다.","콜론(:) 뒤에 나열되는 구조를 한국어에서도 살리면 원문의 리듬이 전달됩니다."]},
        feedback_ko_to_en:{ideal:"The Pomodoro Technique, developed by Francesco Cirillo in the late 1980s, is deceptively simple: work for 25 minutes, take a 5-minute break, and repeat.", comments:["'놀라울 정도로 단순'을 'surprisingly simple'로 직역하면 'deceptively'의 뉘앙스를 놓칩니다.","과거분사 삽입구(developed by~)를 활용하여 간결하게 배경 정보를 전달하세요."]}},
      {en:"After four cycles, take a longer 15-to-30-minute break.", ko:"4번의 사이클이 끝나면 15~30분간 긴 휴식을 취합니다.",
        feedback_en_to_ko:{ideal:"4번의 사이클 후에는 15~30분간의 더 긴 휴식을 취합니다.", comments:["'after'는 '끝나면'도 가능하지만 '후에는'이 시간 순서를 더 명확히 합니다.","'longer'는 비교급이므로 '긴'보다 '더 긴'이 정확합니다."]},
        feedback_ko_to_en:{ideal:"After four cycles, take a longer break of 15 to 30 minutes.", comments:["'사이클이 끝나면'은 'after four cycles'로 간결하게 표현합니다.","숫자 범위는 'to'로 연결하며, 'longer break of~' 구문이 자연스럽습니다."]}},
      {en:"Named after the tomato-shaped kitchen timer Cirillo used as a university student, it has become one of the most popular productivity methods worldwide.", ko:"시릴로가 대학생 시절 사용한 토마토 모양 주방 타이머에서 이름을 따온 이 기법은 전 세계에서 가장 인기 있는 생산성 방법론 중 하나가 되었습니다.",
        feedback_en_to_ko:{ideal:"시릴로가 대학생 시절 사용하던 토마토 모양 주방 타이머의 이름을 딴 이 기법은 전 세계적으로 가장 인기 있는 생산성 기법 중 하나가 되었습니다.", comments:["'Named after'는 '이름을 따온'보다 '이름을 딴'이 더 간결합니다.","'worldwide'는 '전 세계에서'보다 '전 세계적으로'가 부사적 용법에 맞습니다."]},
        feedback_ko_to_en:{ideal:"Named after the tomato-shaped kitchen timer Cirillo used as a university student, it has become one of the most popular productivity methods worldwide.", comments:["분사구문 'Named after~'로 시작하는 문두 수식어를 활용하세요.","'가장 인기 있는 ~ 중 하나'는 'one of the most popular~'로 정확히 대응됩니다."]}},
      {en:"Neuroscience research supports the core idea.", ko:"신경과학 연구는 이 핵심 아이디어를 뒷받침합니다.",
        feedback_en_to_ko:{ideal:"신경과학 연구가 이 핵심 개념을 뒷받침합니다.", comments:["'idea'는 맥락에 따라 '아이디어'보다 '개념'이 학술적 느낌에 적합합니다.","주어 조사 '는' 대신 '가'를 쓰면 새로운 정보 도입의 뉘앙스가 살아납니다."]},
        feedback_ko_to_en:{ideal:"Neuroscience research supports the core idea.", comments:["짧고 직접적인 문장이므로 직역이 가장 자연스럽습니다.","'뒷받침하다'는 'supports'가 정확합니다. 'backs up'은 구어체에 가깝습니다."]}},
      {en:"Our brains are not designed for sustained focus over long periods.", ko:"우리의 뇌는 장시간 지속적인 집중을 위해 설계되지 않았습니다.",
        feedback_en_to_ko:{ideal:"우리의 뇌는 장시간에 걸친 지속적 집중에 적합하도록 설계되지 않았습니다.", comments:["'for~'는 '~을 위해'도 되지만 '~에 적합하도록'이 '설계'와 더 자연스럽게 어울립니다.","'over long periods'는 '장시간에 걸친'으로 기간의 지속성을 강조할 수 있습니다."]},
        feedback_ko_to_en:{ideal:"Our brains are not designed for sustained focus over extended periods.", comments:["'장시간'은 'long periods' 대신 'extended periods'를 쓰면 더 학술적입니다.","'sustained focus'는 '지속적인 집중'의 정확한 대응어입니다."]}},
      {en:"Studies show that attention begins to decline after roughly 20 minutes of continuous work.", ko:"연구에 따르면 약 20분간의 연속 작업 후 주의력이 감소하기 시작합니다.",
        feedback_en_to_ko:{ideal:"연구에 따르면 약 20분간 연속으로 작업한 후 주의력이 떨어지기 시작합니다.", comments:["'decline'은 '감소하다'보다 '떨어지다'가 주의력의 자연스러운 하락에 적합합니다.","'of continuous work'는 '연속 작업'보다 '연속으로 작업한'이 더 유려합니다."]},
        feedback_ko_to_en:{ideal:"Studies show that attention starts to decline after approximately 20 minutes of continuous work.", comments:["'감소하기 시작하다'는 'begins to decline' 또는 'starts to decline' 모두 가능합니다.","'약'은 'roughly'도 맞지만 'approximately'가 학술 맥락에 적합합니다."]}},
      {en:"The Pomodoro Technique essentially works with our biology rather than against it, providing regular reset points that help maintain consistent focus throughout the day.", ko:"뽀모도로 기법은 본질적으로 우리 생체 리듬에 맞서기보다 함께 작동하며, 하루 종일 일관된 집중력을 유지하도록 정기적인 리셋 포인트를 제공합니다.",
        feedback_en_to_ko:{ideal:"뽀모도로 기법은 본질적으로 우리의 생리적 특성에 역행하기보다 순응하여, 하루 종일 일관된 집중력을 유지할 수 있는 정기적 재설정 지점을 제공합니다.", comments:["'works with ~ rather than against'는 '함께 작동/맞서기'보다 '순응하다/역행하다'가 대비가 명확합니다.","'biology'는 '생체 리듬'보다 '생리적 특성'이 더 포괄적이고 정확합니다."]},
        feedback_ko_to_en:{ideal:"The Pomodoro Technique essentially works with our biology rather than against it, providing regular reset points that help maintain consistent focus throughout the day.", comments:["'생체 리듬에 순응하다'는 'works with our biology'로, '역행하다'는 'against it'으로 대비합니다.","분사구문 'providing~'으로 부가 정보를 연결하는 패턴을 활용하세요."]}},
      {en:"Critics point out that 25 minutes can feel too short for deep work like coding or writing, where getting into a flow state takes time.", ko:"비판론자들은 코딩이나 글쓰기 같은 심층 작업에서 25분은 너무 짧게 느껴질 수 있다고 지적합니다.",
        feedback_en_to_ko:{ideal:"비판론자들은 코딩이나 글쓰기처럼 몰입 상태에 들어가는 데 시간이 걸리는 심층 작업에서 25분은 너무 짧게 느껴질 수 있다고 지적합니다.", comments:["원문의 'where getting into a flow state takes time' 관계절이 번역에서 누락되었습니다.","'flow state'는 '몰입 상태'로 번역하는 것이 심리학 맥락에서 표준적입니다."]},
        feedback_ko_to_en:{ideal:"Critics point out that 25 minutes can feel too short for deep work like coding or writing, where entering a flow state takes time.", comments:["'심층 작업'은 'deep work'으로 Cal Newport의 용어와 일치합니다.","'where' 관계부사절을 활용하여 보충 설명을 자연스럽게 연결하세요."]}},
      {en:"The key takeaway may not be the specific intervals, but the broader principle: structured breaks make you more productive, not less.", ko:"핵심 교훈은 특정 간격이 아니라 더 넓은 원칙일 수 있습니다. 구조화된 휴식이 생산성을 떨어뜨리는 것이 아니라 오히려 높인다는 것입니다.",
        feedback_en_to_ko:{ideal:"핵심 교훈은 특정 시간 간격이 아니라 더 큰 원칙에 있을 수 있습니다: 구조화된 휴식은 생산성을 낮추는 것이 아니라 오히려 높인다는 것입니다.", comments:["'not A but B' 구문에서 '아니라'가 두 번 나오면 혼란을 줄 수 있으므로, 앞뒤 구조를 구별하세요.","콜론(:) 뒤에 핵심 메시지를 배치하면 원문의 강조 효과가 살아납니다."]},
        feedback_ko_to_en:{ideal:"The key takeaway may not be the specific intervals, but the broader principle: structured breaks make you more productive, not less.", comments:["'핵심 교훈'은 'key takeaway'로 비즈니스/자기계발 맥락에서 자주 쓰입니다.","'not less'라는 간결한 마무리가 대비 효과를 극대화합니다."]}}
    ]

      feedback_ko_to_en:{ideal:"Caffeine has a half-life of roughly 5 to 6 hours, meaning a 3 PM espresso still has half its caffeine active at 8 or 9 PM.", comments:["'meaning'을 사용한 분사구문으로 인과 관계를 자연스럽게 연결합니다.","'활성 상태'는 'active'로 간결하게 표현합니다."]}}
  ]}
];

// ── Dynamic Fetch ──

async function fetchArticles() {

    setTimeout(() => resolve(MOCK_ARTICLES), 1400);

}

// ── Dictionary ──
const enToKo = {

  "commute":"통근","collaboration":"협업","breakthrough":"돌파구","vacancy":"공실",
  "revolution":"혁명","technique":"기법","neuroscience":"신경과학","sustained":"지속적인",
  "flow":"몰입","interval":"간격","caffeine":"카페인","adenosine":"아데노신",

  "disruption":"파괴적 혁신","ecosystem":"생태계","platform":"플랫폼"
};
const koToEn = {};
for (const [en,ko] of Object.entries(enToKo)) koToEn[ko] = en;

function lookupWord(word) {
  const lower = word.toLowerCase();
  if (currentTab === 'en') {
    const ko = enToKo[lower];
    return ko ? { displayWord:lower, meaning:ko } : { displayWord:lower, meaning:null };
  } else {
    const en = koToEn[word];
    if (en) return { displayWord:en, meaning:word };
    for (const [ek,kv] of Object.entries(enToKo)) {
      if (word.includes(kv) || kv.includes(word)) return { displayWord:ek, meaning:kv };
    }
    return { displayWord:word, meaning:null };
  }
}
function getFallback(w) {
  const m = ["(명) 비즈니스 핵심 용어","(동) 업무를 수행하다","(형) 조직 특성 표현","(명) 실용적 개념"];
  return m[w.length % m.length];
}

// ── Render ──
function renderDifficulty(lv) {
  return '<span style="letter-spacing:-1px">'+'★'.repeat(lv)+'<span style="opacity:0.2">★</span>'.repeat(10-lv)+'</span> '+lv+'/10';
}
function renderMeta() {
  const a = articles[currentDay];
  document.getElementById('metaBox').innerHTML = `
    <div class="meta-title">${esc(a.title)}</div>
    <div class="meta-summary">${esc(a.summary)}</div>
    <div class="meta-tags">
      <span class="meta-tag difficulty">${renderDifficulty(a.difficulty)}</span>
      <span class="meta-tag"><a href="${esc(a.sourceUrl)}" target="_blank" rel="noopener">${esc(a.sourceName)}</a></span>
      <span class="meta-tag">${esc(a.date)}</span>
    </div>`;
}
function renderSidebar() {
  document.getElementById('sidebar').innerHTML = articles.map((a,i) => `
    <button class="sidebar-item${i===currentDay?' active':''}" onclick="selectDay(${i})" title="${esc(a.title)}">
      <span class="sidebar-num">${i+1}</span>
      <span class="sidebar-title">${esc(a.title)}</span>
    </button>`).join('');
}
function renderArticle() {
  const a = articles[currentDay];
  const pairs = a.content;
  const paras = []; let buf = [];
  pairs.forEach((p,i) => {
    buf.push(currentTab === 'en' ? p.en : p.ko);
    if ((i+1)%3===0 || i===pairs.length-1) { paras.push(buf.join(' ')); buf=[]; }
  });
  document.getElementById('articleContent').innerHTML = paras.map(p=>`<p>${p}</p>`).join('');
}
function renderSentences() {
  const a = articles[currentDay];
  const list = document.getElementById('sentenceList');
  const srcKey = currentTab === 'en' ? 'en' : 'ko';
  const d = currentDay, t = currentTab;

  list.innerHTML = a.content.map((pair, i) => {
    const savedVal = getInput(d,t,i);
    const savedRes = getResult(d,t,i);
    return `
    <div class="s-block" id="sb-${i}">
      <div class="s-source"><span class="s-num">${i+1}</span>${esc(pair[srcKey])}</div>
      <div class="s-input-row">
        <textarea class="s-input" id="si-${i}" rows="1"
          oninput="autoResize(this);onInput(${i},this.value)">${esc(savedVal)}</textarea>
        <button class="s-btn" id="sbtn-${i}" onclick="correctSentence(${i})" title="AI 교정">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 3l1.5 4.5L18 9l-4.5 1.5L12 15l-1.5-4.5L6 9l4.5-1.5z"/><path d="M19 2l.5 1.5L21 4l-1.5.5L19 6l-.5-1.5L17 4l1.5-.5z"/><path d="M5 18l.5 1.5L7 20l-1.5.5L5 22l-.5-1.5L3 20l1.5-.5z"/></svg>
        </button>
      </div>
      <div class="s-loading" id="sl-${i}"><div class="s-spinner"></div> 분석 중...</div>
      <div class="s-result${savedRes?' show':''}" id="sr-${i}">${savedRes}</div>
    </div>`;
  }).join('');

  a.content.forEach((_,i) => {
    const el = document.getElementById('si-'+i);
    if (el && el.value) autoResize(el);
  });
}
function autoResize(el) {
  el.style.height = 'auto';
  el.style.height = Math.min(el.scrollHeight, 80) + 'px';
}
function selectDay(i) {
  currentDay = i;
  renderSidebar(); renderArticle(); renderMeta(); renderSentences(); hideTooltip();
}
function switchTab(tab) {
  currentTab = tab;
  document.querySelectorAll('.tab').forEach(t => t.classList.toggle('active', t.dataset.tab===tab));
  renderArticle(); renderMeta(); renderSentences(); hideTooltip();
}

// ── Per-sentence AI Correction ──
function correctSentence(idx) {
  const input = document.getElementById('si-'+idx);
  if (!input.value.trim()) { showToast('먼저 번역/영작을 입력해 주세요.'); return; }
  const btn = document.getElementById('sbtn-'+idx);
  const loading = document.getElementById('sl-'+idx);
  const result = document.getElementById('sr-'+idx);
  btn.disabled = true;
  result.classList.remove('show'); result.innerHTML = '';
  loading.classList.add('show');

  setTimeout(() => {
    loading.classList.remove('show');
    const userText = input.value.trim();
    const pair = articles[currentDay].content[idx];
    const feedback = currentTab === 'en' ? pair.feedback_en_to_ko : pair.feedback_ko_to_en;

    let html;
    if (!feedback) {
      html = '<div class="s-no-feedback">이 문장의 피드백 데이터가 아직 준비되지 않았습니다. 파이프라인이 연결되면 자동으로 생성됩니다.</div>';
    } else {
      const comments = feedback.comments.map(c =>
        `<div class="s-comment"><span class="s-comment-icon">&#x1f4a1;</span>${esc(c)}</div>`
      ).join('');
      html = `<div class="s-diff">
        <div class="s-diff-del">- ${esc(userText)}</div>
        <div class="s-diff-add">+ ${esc(feedback.ideal)}</div>
      </div>${comments}`;
    }

    result.innerHTML = html;
    result.classList.add('show');
    btn.disabled = false;
    saveResult(currentDay, currentTab, idx, html);
  }, 1600);
}

// ── Tooltip ──
function hideTooltip() { document.getElementById('tooltip').classList.remove('show'); }
document.addEventListener('DOMContentLoaded', () => {
  document.getElementById('articleContent').addEventListener('dblclick', function(e) {
    const sel = window.getSelection(); const word = sel.toString().trim();
    if (!word || word.includes(' ')) return;
    const range = sel.getRangeAt(0);
    let ctx = range.startContainer;
    while (ctx && ctx.nodeName !== 'P') ctx = ctx.parentNode;
    selectedContext = ctx ? ctx.textContent.substring(0,120)+'...' : '';
    const r = lookupWord(word);
    selectedWord = r.displayWord;
    selectedMeaning = r.meaning || getFallback(word);
    const rect = range.getBoundingClientRect();
    const tip = document.getElementById('tooltip');
    document.getElementById('tooltipWord').textContent = selectedWord;
    document.getElementById('tooltipMeaning').textContent = selectedMeaning;
    document.getElementById('tooltipContext').textContent = `"${selectedContext}"`;
    let left = rect.left + rect.width/2 - 120, top = rect.bottom + 10;
    if (left < 10) left = 10;
    if (left + 280 > window.innerWidth) left = window.innerWidth - 290;
    if (top + 200 > window.innerHeight) top = rect.top - 180;
    tip.style.left = left+'px'; tip.style.top = top+'px';
    tip.classList.add('show');
  });
  document.addEventListener('click', function(e) {
    if (!e.target.closest('.tooltip') && !window.getSelection().toString().trim()) hideTooltip();
  });
});

// ── Supabase CRUD ──
async function addToVocab() {
  hideTooltip();
  try {
    const { error } = await sb.from('vocabulary').insert({ word:selectedWord, meaning:selectedMeaning, context:selectedContext });
    if (error) { showToast('저장 실패: '+error.message); }
    else { showToast(`"${selectedWord}" 단어장에 추가되었습니다.`); }
  } catch(e) {
    showToast('서버 연결 실패 — Supabase 프로젝트 상태를 확인해 주세요.');
    console.error('addToVocab network error:', e);
  }
}
async function openVocabModal() {
  document.getElementById('vocabModal').classList.add('show');
  await loadVocab();
}
function closeVocabModal() { document.getElementById('vocabModal').classList.remove('show'); }
document.getElementById('vocabModal').addEventListener('click', function(e) { if (e.target===this) closeVocabModal(); });

async function loadVocab() {
  const list = document.getElementById('vocabList');
  list.innerHTML = '<div class="vocab-empty">불러오는 중...</div>';
  let data, error;
  try {
    ({data, error} = await sb.from('vocabulary').select('*').order('created_at',{ascending:false}));
  } catch(e) {
    list.innerHTML = '<div class="vocab-empty">서버에 연결할 수 없습니다.<br>Supabase 프로젝트 상태를 확인해 주세요.</div>';
    console.error('loadVocab network error:', e);
    return;
  }
  if (error) { list.innerHTML = `<div class="vocab-empty">조회 실패: ${error.message}</div>`; return; }
  if (!data || data.length===0) {
    list.innerHTML = '<div class="vocab-empty">저장된 단어가 없습니다.<br>아티클에서 단어를 더블 클릭하여 추가해 보세요.</div>';
    return;
  }
  list.innerHTML = data.map(item => `
    <div class="vocab-item">
      <div class="vocab-info">
        <div class="vocab-word">${esc(item.word)}</div>
        <div class="vocab-meaning">${esc(item.meaning)}</div>
        ${item.context ? `<div class="vocab-ctx">${esc(item.context)}</div>` : ''}
      </div>
      <button class="vocab-del" onclick="deleteVocab(${item.id})">삭제</button>
    </div>`).join('');
}
async function deleteVocab(id) {
  try {
    const { error } = await sb.from('vocabulary').delete().eq('id', id);
    if (error) { showToast('삭제 실패: '+error.message); }
    else { showToast('단어가 삭제되었습니다.'); await loadVocab(); }
  } catch(e) {
    showToast('서버 연결 실패 — Supabase 프로젝트 상태를 확인해 주세요.');
    console.error('deleteVocab network error:', e);
  }
}

// ── Utilities ──
function esc(s) { const d = document.createElement('div'); d.textContent = s; return d.innerHTML; }
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2500);
}

// ── Init ──
async function init() {
  loadStore();
  articles = await fetchArticles();
  document.getElementById('loadingScreen').classList.add('hide');
  document.getElementById('appHeader').style.display = '';
  document.getElementById('appLayout').style.display = '';
  renderSidebar(); renderArticle(); renderMeta(); renderSentences();
}
init();
</script>
