<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>IEL</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --bg-body: #f5f6f8;
    --bg-white: #ffffff;
    --bg-sidebar: #f0f1f4;
    --bg-sidebar-active: #eae6fb;
    --bg-hover: #edeef1;
    --bg-input: #f8f9fb;
    --border: #e2e4e9;
    --border-focus: #7c5ce7;
    --text-primary: #1a1d27;
    --text-secondary: #5a5f72;
    --text-muted: #9298a8;
    --accent: #7c5ce7;
    --accent-hover: #6a4bd4;
    --accent-glow: rgba(124, 92, 231, 0.15);
    --accent-light: #f0ecfd;
    --danger: #e74c5c;
    --danger-hover: #d43b4a;
    --success: #2ecc71;
    --diff-add-bg: rgba(46, 204, 113, 0.10);
    --diff-add-border: #2ecc71;
    --diff-del-bg: rgba(231, 76, 92, 0.08);
    --diff-del-border: #e74c5c;
    --radius: 10px;
    --radius-sm: 6px;
    --shadow-sm: 0 1px 3px rgba(0,0,0,0.06);
    --shadow-md: 0 4px 16px rgba(0,0,0,0.08);
    --shadow-lg: 0 12px 40px rgba(0,0,0,0.12);
    --transition: 0.2s ease;
  }

  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Noto Sans KR', sans-serif;
    background: var(--bg-body);
    color: var(--text-primary);
    height: 100vh;
    overflow: hidden;
    display: flex;
    flex-direction: column;
  }

  /* ── Header ── */
  .header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 12px 24px;
    background: var(--bg-white);
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
  }
  .header-left { display: flex; align-items: center; gap: 10px; }
  .logo {
    width: 32px; height: 32px;
    background: var(--accent);
    border-radius: 8px;
    display: grid; place-items: center;
    font-weight: 800; font-size: 12px; color: #fff;
    letter-spacing: -0.5px;
  }
  .header h1 { font-size: 16px; font-weight: 700; color: var(--text-primary); letter-spacing: -0.3px; }

  .btn-vocab {
    padding: 7px 16px;
    background: var(--bg-white);
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    color: var(--text-primary);
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    transition: var(--transition);
    display: flex; align-items: center; gap: 6px;
  }
  .btn-vocab:hover { border-color: var(--accent); color: var(--accent); background: var(--accent-light); }
  .btn-vocab svg { width: 15px; height: 15px; }

  /* ── Layout ── */
  .layout {
    display: flex;
    flex: 1;
    overflow: hidden;
  }

  /* ── Sidebar ── */
  .sidebar {
    width: 64px;
    background: var(--bg-white);
    border-right: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 12px 0;
    gap: 4px;
    overflow-y: auto;
    flex-shrink: 0;
  }
  .sidebar::-webkit-scrollbar { width: 0; }
  .sidebar-label {
    font-size: 9px;
    font-weight: 700;
    color: var(--text-muted);
    text-transform: uppercase;
    letter-spacing: 1px;
    margin-bottom: 6px;
  }
  .sidebar-item {
    width: 42px; height: 42px;
    display: grid; place-items: center;
    border-radius: var(--radius-sm);
    border: none;
    background: transparent;
    color: var(--text-secondary);
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    transition: var(--transition);
  }
  .sidebar-item:hover { background: var(--bg-hover); color: var(--text-primary); }
  .sidebar-item.active {
    background: var(--accent);
    color: #fff;
    box-shadow: 0 2px 8px var(--accent-glow);
  }

  /* ── Main Split ── */
  .main {
    display: flex;
    flex: 1;
    overflow: hidden;
  }

  .panel {
    width: 50%;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }
  .panel-left { border-right: 1px solid var(--border); background: var(--bg-white); }
  .panel-right { background: var(--bg-body); }

  .panel-header {
    padding: 18px 24px 0;
    flex-shrink: 0;
  }
  .panel-title {
    font-size: 11px;
    font-weight: 700;
    color: var(--text-muted);
    text-transform: uppercase;
    letter-spacing: 1.2px;
    margin-bottom: 12px;
  }

  /* ── Tabs ── */
  .tabs {
    display: flex;
    gap: 4px;
    background: var(--bg-body);
    border-radius: var(--radius-sm);
    padding: 3px;
  }
  .tab {
    flex: 1;
    padding: 9px 14px;
    background: transparent;
    border: none;
    border-radius: 5px;
    color: var(--text-muted);
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    transition: var(--transition);
  }
  .tab:hover { color: var(--text-primary); }
  .tab.active {
    background: var(--accent);
    color: #fff;
    box-shadow: 0 2px 8px var(--accent-glow);
  }

  /* ── Article ── */
  .article-meta {
    padding: 16px 24px 0;
    flex-shrink: 0;
  }
  .article-title-text {
    font-size: 17px;
    font-weight: 700;
    color: var(--text-primary);
    line-height: 1.4;
  }
  .article-content {
    flex: 1;
    padding: 16px 24px 24px;
    overflow-y: auto;
    line-height: 1.9;
    font-size: 15px;
    color: var(--text-primary);
  }
  .article-content p { margin-bottom: 16px; }
  .article-content::-webkit-scrollbar { width: 5px; }
  .article-content::-webkit-scrollbar-track { background: transparent; }
  .article-content::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

  /* ── Right Panel ── */
  .editor-wrap {
    flex: 1;
    padding: 18px 24px;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }
  .editor {
    flex: 1;
    width: 100%;
    background: var(--bg-white);
    border: 1.5px solid var(--border);
    border-radius: var(--radius);
    padding: 16px 18px;
    color: var(--text-primary);
    font-size: 15px;
    line-height: 1.8;
    resize: none;
    font-family: inherit;
    transition: border-color var(--transition), box-shadow var(--transition);
    min-height: 0;
    box-shadow: var(--shadow-sm);
  }
  .editor:focus { outline: none; border-color: var(--accent); box-shadow: 0 0 0 3px var(--accent-glow); }
  .editor::placeholder { color: var(--text-muted); }

  .btn-ai {
    margin-top: 14px;
    padding: 13px 24px;
    background: var(--accent);
    border: none;
    border-radius: var(--radius);
    color: #fff;
    font-size: 14px;
    font-weight: 700;
    cursor: pointer;
    transition: var(--transition);
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    flex-shrink: 0;
    box-shadow: 0 2px 10px var(--accent-glow);
  }
  .btn-ai:hover:not(:disabled) { background: var(--accent-hover); transform: translateY(-1px); box-shadow: 0 4px 16px var(--accent-glow); }
  .btn-ai:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }
  .btn-ai svg { width: 17px; height: 17px; }

  /* ── Loading ── */
  .loading-area {
    display: none;
    flex-direction: column;
    align-items: center;
    gap: 12px;
    padding: 24px 0;
    flex-shrink: 0;
  }
  .loading-area.show { display: flex; }
  .spinner {
    width: 32px; height: 32px;
    border: 3px solid var(--border);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  .loading-text { font-size: 13px; color: var(--text-secondary); font-weight: 500; }

  /* ── Diff Result ── */
  .diff-result {
    display: none;
    flex-direction: column;
    gap: 12px;
    margin-top: 14px;
    flex-shrink: 0;
    max-height: 300px;
    overflow-y: auto;
  }
  .diff-result.show { display: flex; }
  .diff-result::-webkit-scrollbar { width: 5px; }
  .diff-result::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

  .diff-title {
    font-size: 13px;
    font-weight: 700;
    color: var(--accent);
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .diff-block {
    background: var(--bg-white);
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    padding: 14px 16px;
    font-size: 13.5px;
    line-height: 1.9;
  }
  .diff-line-del {
    background: var(--diff-del-bg);
    border-left: 3px solid var(--diff-del-border);
    padding: 3px 10px;
    margin: 3px 0;
    border-radius: 3px;
    text-decoration: line-through;
    color: #c0392b;
  }
  .diff-line-add {
    background: var(--diff-add-bg);
    border-left: 3px solid var(--diff-add-border);
    padding: 3px 10px;
    margin: 3px 0;
    border-radius: 3px;
    color: #1e8449;
  }
  .diff-comment {
    background: var(--accent-light);
    border-left: 3px solid var(--accent);
    padding: 10px 14px;
    border-radius: 3px;
    font-size: 13px;
    color: var(--text-secondary);
    line-height: 1.7;
  }
  .diff-comment strong { color: var(--accent); }

  /* ── Tooltip ── */
  .tooltip {
    display: none;
    position: fixed;
    z-index: 1000;
    background: var(--bg-white);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 14px 16px;
    box-shadow: var(--shadow-lg);
    min-width: 230px;
    max-width: 300px;
  }
  .tooltip.show { display: block; }
  .tooltip-word { font-size: 16px; font-weight: 700; color: var(--accent); margin-bottom: 5px; }
  .tooltip-meaning { font-size: 13px; color: var(--text-secondary); margin-bottom: 4px; line-height: 1.5; }
  .tooltip-context { font-size: 11.5px; color: var(--text-muted); margin-bottom: 10px; line-height: 1.5; font-style: italic; }
  .tooltip-btn {
    width: 100%;
    padding: 8px 12px;
    background: var(--accent);
    border: none;
    border-radius: var(--radius-sm);
    color: #fff;
    font-size: 12.5px;
    font-weight: 600;
    cursor: pointer;
    transition: var(--transition);
  }
  .tooltip-btn:hover { background: var(--accent-hover); }

  /* ── Modal ── */
  .modal-overlay {
    display: none;
    position: fixed;
    inset: 0;
    z-index: 2000;
    background: rgba(0,0,0,0.3);
    backdrop-filter: blur(4px);
    place-items: center;
  }
  .modal-overlay.show { display: grid; }
  .modal {
    background: var(--bg-white);
    border: 1px solid var(--border);
    border-radius: 14px;
    width: 540px;
    max-width: 92vw;
    max-height: 80vh;
    display: flex;
    flex-direction: column;
    box-shadow: var(--shadow-lg);
    animation: modalIn 0.25s ease;
  }
  @keyframes modalIn { from { opacity: 0; transform: translateY(14px) scale(0.97); } }
  .modal-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 18px 22px;
    border-bottom: 1px solid var(--border);
  }
  .modal-header h2 { font-size: 16px; font-weight: 700; }
  .modal-close {
    width: 30px; height: 30px;
    background: var(--bg-body);
    border: none;
    border-radius: 8px;
    color: var(--text-secondary);
    font-size: 17px;
    cursor: pointer;
    display: grid; place-items: center;
    transition: var(--transition);
  }
  .modal-close:hover { background: var(--danger); color: #fff; }
  .modal-body {
    padding: 18px 22px;
    overflow-y: auto;
    flex: 1;
  }
  .modal-body::-webkit-scrollbar { width: 5px; }
  .modal-body::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
  .vocab-empty { text-align: center; padding: 36px 0; color: var(--text-muted); font-size: 13px; }
  .vocab-item {
    display: flex;
    align-items: flex-start;
    gap: 12px;
    padding: 12px 0;
    border-bottom: 1px solid var(--border);
  }
  .vocab-item:last-child { border-bottom: none; }
  .vocab-info { flex: 1; }
  .vocab-word { font-size: 15px; font-weight: 700; color: var(--accent); margin-bottom: 3px; }
  .vocab-meaning { font-size: 13px; color: var(--text-secondary); margin-bottom: 2px; }
  .vocab-ctx { font-size: 11.5px; color: var(--text-muted); font-style: italic; line-height: 1.5; }
  .vocab-del {
    padding: 5px 10px;
    background: transparent;
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    color: var(--text-muted);
    font-size: 11.5px;
    cursor: pointer;
    transition: var(--transition);
    flex-shrink: 0;
    margin-top: 2px;
  }
  .vocab-del:hover { background: var(--danger); border-color: var(--danger); color: #fff; }

  /* ── Toast ── */
  .toast {
    position: fixed;
    bottom: 24px;
    left: 50%;
    transform: translateX(-50%) translateY(70px);
    background: var(--text-primary);
    border-radius: var(--radius);
    padding: 11px 20px;
    font-size: 13px;
    font-weight: 600;
    color: #fff;
    box-shadow: var(--shadow-md);
    z-index: 3000;
    opacity: 0;
    transition: transform 0.35s ease, opacity 0.35s ease;
  }
  .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
</style>
</head>

<header class="header">
  <div class="header-left">

    <h1>IEL</h1>

  <button class="btn-vocab" onclick="openVocabModal()">

</div>

<div class="modal-overlay" id="vocabModal">
  <div class="modal">

      <button class="modal-close" onclick="closeVocabModal()">&times;</button>
    </div>
    <div class="modal-body" id="vocabList"></div>
  </div>
</div>

<div class="toast" id="toast"></div>

function getFakeMeaning(word) {
  const lower = word.toLowerCase();
  if (fakeMeanings[lower]) return fakeMeanings[lower];
  if (fakeMeanings[word]) return fakeMeanings[word];
  const meanings = [
    "(명) 비즈니스 환경에서 자주 쓰이는 핵심 용어",
    "(동) 업무나 프로세스를 수행하거나 실행하다",
    "(형) 업무 또는 조직의 특성을 나타내는 표현",
    "(명) 직장 생활에서 널리 쓰이는 실용적 개념",
  ];
  return meanings[word.length % meanings.length];
}

function renderSidebar() {
  const sidebar = document.querySelector('.sidebar');
  const label = sidebar.querySelector('.sidebar-label');
  sidebar.innerHTML = '';
  sidebar.appendChild(label);
  articles.forEach((_, i) => {
    const btn = document.createElement('button');
    btn.className = 'sidebar-item' + (i === currentDay ? ' active' : '');
    btn.textContent = i + 1;
    btn.onclick = () => selectDay(i);
    sidebar.appendChild(btn);
  });
}

function selectDay(index) {
  currentDay = index;
  renderSidebar();
  renderArticle();
  hideDiffResult();
}

function renderArticle() {
  const a = articles[currentDay];
  document.getElementById('articleTitle').textContent = currentTab === 'en' ? a.title_en : a.title_ko;
  const paragraphs = currentTab === 'en' ? a.en : a.ko;
  document.getElementById('articleContent').innerHTML = paragraphs.map(p => `<p>${p}</p>`).join('');
}

function switchTab(tab) {
  currentTab = tab;
  document.querySelectorAll('.tab').forEach(t => t.classList.toggle('active', t.dataset.tab === tab));
  document.getElementById('rightTitle').textContent = tab === 'en' ? 'My Translation' : 'My Writing';
  document.getElementById('userEditor').placeholder = tab === 'en'
    ? '영문 아티클을 읽고 한국어로 번역해 보세요...'
    : '한글 번역본을 읽고 영어로 영작해 보세요...';
  renderArticle();
  hideTooltip();
  hideDiffResult();
}

// ── Tooltip ──
function hideTooltip() { document.getElementById('tooltip').classList.remove('show'); }

document.getElementById('articleContent').addEventListener('dblclick', function(e) {
  const sel = window.getSelection();
  const word = sel.toString().trim();
  if (!word || word.includes(' ')) return;
  selectedWord = word;
  const range = sel.getRangeAt(0);
  let contextNode = range.startContainer;
  while (contextNode && contextNode.nodeName !== 'P') contextNode = contextNode.parentNode;
  selectedContext = contextNode ? contextNode.textContent.substring(0, 120) + '...' : '';
  selectedMeaning = getFakeMeaning(word);
  const rect = range.getBoundingClientRect();
  const tip = document.getElementById('tooltip');
  document.getElementById('tooltipWord').textContent = word;
  document.getElementById('tooltipMeaning').textContent = selectedMeaning;
  document.getElementById('tooltipContext').textContent = `"${selectedContext}"`;
  let left = rect.left + rect.width / 2 - 120;
  let top = rect.bottom + 10;
  if (left < 10) left = 10;
  if (left + 300 > window.innerWidth) left = window.innerWidth - 310;
  if (top + 200 > window.innerHeight) top = rect.top - 180;
  tip.style.left = left + 'px';
  tip.style.top = top + 'px';
  tip.classList.add('show');
});

document.addEventListener('click', function(e) {
  if (!e.target.closest('.tooltip') && !window.getSelection().toString().trim()) hideTooltip();
});

// ── Supabase CRUD ──
async function addToVocab() {
  hideTooltip();
  try {
    const { error } = await sb.from('vocabulary').insert({ word: selectedWord, meaning: selectedMeaning, context: selectedContext });
    if (error) { showToast('저장 실패: ' + error.message); }
    else { showToast(`"${selectedWord}" 단어장에 추가되었습니다.`); }
  } catch (e) {
    showToast('서버 연결 실패 — Supabase 프로젝트 상태를 확인해 주세요.');
    console.error('addToVocab network error:', e);
  }
}

async function openVocabModal() {
  document.getElementById('vocabModal').classList.add('show');
  await loadVocab();
}
function closeVocabModal() { document.getElementById('vocabModal').classList.remove('show'); }
document.getElementById('vocabModal').addEventListener('click', function(e) { if (e.target === this) closeVocabModal(); });

async function loadVocab() {
  const list = document.getElementById('vocabList');
  list.innerHTML = '<div class="vocab-empty">불러오는 중...</div>';
  let data, error;
  try {
    ({ data, error } = await sb.from('vocabulary').select('*').order('created_at', { ascending: false }));
  } catch (e) {
    list.innerHTML = '<div class="vocab-empty">서버에 연결할 수 없습니다.<br>Supabase 프로젝트 상태를 확인해 주세요.</div>';
    console.error('loadVocab network error:', e);
    return;
  }
  if (error) { list.innerHTML = `<div class="vocab-empty">조회 실패: ${error.message}</div>`; return; }
  if (!data || data.length === 0) {
    list.innerHTML = '<div class="vocab-empty">저장된 단어가 없습니다.<br>아티클에서 단어를 더블 클릭하여 추가해 보세요.</div>';
    return;
  }
  list.innerHTML = data.map(item => `
    <div class="vocab-item">
      <div class="vocab-info">
        <div class="vocab-word">${esc(item.word)}</div>
        <div class="vocab-meaning">${esc(item.meaning)}</div>
        ${item.context ? `<div class="vocab-ctx">${esc(item.context)}</div>` : ''}
      </div>
      <button class="vocab-del" onclick="deleteVocab(${item.id})">삭제</button>
    </div>`).join('');
}

async function deleteVocab(id) {
  try {
    const { error } = await sb.from('vocabulary').delete().eq('id', id);
    if (error) { showToast('삭제 실패: ' + error.message); }
    else { showToast('단어가 삭제되었습니다.'); await loadVocab(); }
  } catch (e) {
    showToast('서버 연결 실패 — Supabase 프로젝트 상태를 확인해 주세요.');
    console.error('deleteVocab network error:', e);
  }
}

      </div>
      <div class="diff-block">
        <div class="diff-line-del">− ${esc(mock.original)}</div>
        <div class="diff-line-add">+ ${esc(mock.corrected)}</div>
      </div>
      ${mock.comments.map(c => `<div class="diff-comment">${c.text}</div>`).join('')}`;
    diff.classList.add('show');
    btn.disabled = false;
  }, 2500);
}

function esc(str) { const d = document.createElement('div'); d.textContent = str; return d.innerHTML; }

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2500);
}

renderSidebar();
renderArticle();
</script>
</body>
</html>
