<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>IEL</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  *, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }
  :root {
    --bg-body:#f5f6f8; --bg-white:#ffffff; --bg-hover:#edeef1;
    --border:#e2e4e9; --text-primary:#1a1d27; --text-secondary:#5a5f72;
    --text-muted:#9298a8;
    --accent:#10b981; --accent-hover:#059669;
    --accent-glow:rgba(16,185,129,0.15); --accent-light:#ecfdf5;
    --danger:#e74c5c; --success:#2ecc71;
    --diff-add-bg:rgba(16,185,129,0.10); --diff-add-border:#10b981;
    --diff-del-bg:rgba(231,76,92,0.08); --diff-del-border:#e74c5c;
    --radius:16px; --radius-sm:10px;
    --shadow-sm:0 1px 3px rgba(0,0,0,0.06); --shadow-md:0 4px 16px rgba(0,0,0,0.08);
    --shadow-lg:0 12px 40px rgba(0,0,0,0.12); --transition:0.2s ease;
    --spring:cubic-bezier(0.34,1.56,0.64,1);
  }
  body {
    font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,'Noto Sans KR',sans-serif;
    background:var(--bg-body); color:var(--text-primary);
    height:100vh; overflow:hidden; display:flex; flex-direction:column;
  }

  /* ── Loading Screen ── */
  .loading-screen {
    position:fixed; inset:0; z-index:9999; background:var(--bg-white);
    display:grid; place-items:center;
  }
  .loading-screen.hide { display:none; }
  .loading-content { text-align:center; }
  .loading-logo {
    width:56px; height:56px; background:var(--accent); border-radius:18px;
    animation:popIn 0.6s var(--spring) both;
    display:grid; place-items:center; font-weight:800; font-size:18px;
    color:#fff; letter-spacing:-0.5px; margin:0 auto 24px;
  }
  .loading-dots { display:flex; gap:6px; justify-content:center; }
  .loading-dots span {
    width:8px; height:8px; border-radius:50%; background:var(--accent);
    animation:ldot 1.2s ease infinite;
  }
  .loading-dots span:nth-child(2) { animation-delay:0.15s; }
  .loading-dots span:nth-child(3) { animation-delay:0.3s; }
  @keyframes ldot { 0%,80%,100%{opacity:0.2;transform:scale(0.8)} 40%{opacity:1;transform:scale(1.1)} }

  /* ── Header ── */
  .header {
    display:flex; align-items:center; justify-content:space-between;
    padding:10px 20px; background:var(--bg-white);
    border-bottom:1px solid var(--border); flex-shrink:0;
  }
  .header-left { display:flex; align-items:center; gap:10px; }
  .logo {
    width:30px; height:30px; background:var(--accent); border-radius:10px;
    display:grid; place-items:center; font-weight:800; font-size:11px;
    color:#fff; letter-spacing:-0.5px;
  }
  .header h1 { font-size:15px; font-weight:700; letter-spacing:-0.3px; }
  .header-right { display:flex; align-items:center; gap:8px; }
  .btn-icon {
    width:36px; height:36px; background:var(--bg-white); border:1px solid var(--border);
    border-radius:var(--radius-sm); color:var(--text-secondary);
    cursor:pointer; transition:var(--transition); display:grid; place-items:center;
  }
  .btn-icon:hover { border-color:var(--accent); color:var(--accent); background:var(--accent-light); transform:translateY(-2px); box-shadow:0 4px 12px var(--accent-glow); }
  .btn-icon:active { transform:translateY(1px); box-shadow:none; }
  .btn-icon svg { width:18px; height:18px; }

  /* ── Layout ── */
  .layout { display:flex; flex:1; overflow:hidden; }

  /* ── Sidebar (number-only pills) ── */
  .sidebar {
    width:60px; background:var(--bg-white); border-right:1px solid var(--border);
    display:flex; flex-direction:column; align-items:center;
    padding:12px 0; gap:8px; overflow-y:auto; flex-shrink:0;
  }
  .sidebar::-webkit-scrollbar { width:0; }
  .sidebar-item {
    width:40px; height:40px; border-radius:50%; border:2px solid var(--border);
    background:var(--bg-white); color:var(--text-secondary);
    font-size:14px; font-weight:700; cursor:pointer;
    transition:var(--transition); display:grid; place-items:center;
  }
  .sidebar-item:hover { border-color:var(--accent); color:var(--accent); background:var(--accent-light); transform:translateY(-2px); }
  .sidebar-item:active { transform:translateY(1px); }
  .sidebar-item.active {
    background:var(--accent); color:#fff; border-color:var(--accent);
    box-shadow:0 3px 12px var(--accent-glow); animation:popIn 0.3s var(--spring);
  }

  .main { display:flex; flex:1; overflow:hidden; }
  .panel { width:50%; display:flex; flex-direction:column; overflow:hidden; }
  .panel-left { border-right:1px solid var(--border); background:var(--bg-white); }
  .panel-right { background:var(--bg-body); }
  .panel-header { padding:14px 24px 0; flex-shrink:0; }
  .tabs { display:flex; gap:4px; background:var(--bg-body); border-radius:var(--radius-sm); padding:3px; }
  .tab {
    flex:1; padding:8px 14px; background:transparent; border:none;
    border-radius:5px; color:var(--text-muted); font-size:13px;
    font-weight:600; cursor:pointer; transition:var(--transition);
  }
  .tab:hover { color:var(--text-primary); transform:translateY(-1px); }
  .tab:active { transform:translateY(1px); }
  .tab.active { background:var(--accent); color:#fff; box-shadow:0 2px 8px var(--accent-glow); animation:popIn 0.25s var(--spring); }
  .meta-box {
    margin:12px 24px 0; padding:14px 18px; background:var(--bg-body);
    border:1px solid var(--border); border-radius:var(--radius); flex-shrink:0;
  }
  .meta-title { font-size:15px; font-weight:700; line-height:1.4; margin-bottom:6px; }
  .meta-summary { font-size:12.5px; color:var(--text-secondary); line-height:1.6; margin-bottom:8px; }
  .meta-tags { display:flex; flex-wrap:wrap; gap:6px; align-items:center; }
  .meta-tag {
    display:inline-flex; align-items:center; gap:4px; padding:3px 9px;
    background:var(--bg-white); border:1px solid var(--border); border-radius:20px;
    font-size:11px; color:var(--text-secondary); font-weight:500; white-space:nowrap;
  }
  .meta-tag.difficulty { border-color:var(--accent); color:var(--accent); font-weight:600; }
  .meta-tag a { color:var(--accent); text-decoration:none; font-weight:600; }
  .meta-tag a:hover { text-decoration:underline; }
  .article-content {
    flex:1; padding:12px 24px 24px; overflow-y:auto; line-height:1.9; font-size:14.5px;
  }
  .article-content p { margin-bottom:14px; }
  .article-content::-webkit-scrollbar { width:4px; }
  .article-content::-webkit-scrollbar-track { background:transparent; }
  .article-content::-webkit-scrollbar-thumb { background:var(--border); border-radius:3px; }

  /* ── Right: Sentence List ── */
  .sentence-list {
    flex:1; padding:14px 20px; overflow-y:auto;
    display:flex; flex-direction:column; gap:14px;
  }
  .sentence-list::-webkit-scrollbar { width:4px; }
  .sentence-list::-webkit-scrollbar-thumb { background:var(--border); border-radius:3px; }
  .s-block {
    background:var(--bg-white); border:1px solid var(--border);
    border-radius:var(--radius); padding:12px 14px; box-shadow:var(--shadow-sm);
  }
  .s-num {
    display:inline-block; width:20px; height:20px; border-radius:50%;
    background:var(--accent-light); color:var(--accent); font-size:10px;
    font-weight:700; text-align:center; line-height:20px; margin-right:6px; flex-shrink:0;
  }
  .s-source { font-size:13.5px; line-height:1.7; color:var(--text-primary); margin-bottom:8px; }
  .s-input-row { display:flex; gap:6px; align-items:flex-start; }
  .s-input {
    flex:1; padding:9px 12px; border:1.5px solid var(--border);
    border-radius:var(--radius-sm); font-size:13px; font-family:inherit;
    line-height:1.6; color:var(--text-primary); background:var(--bg-body);
    resize:none; min-height:40px; max-height:80px;
    transition:border-color var(--transition), box-shadow var(--transition);
  }
  .s-input:focus { outline:none; border-color:var(--accent); box-shadow:0 0 0 3px var(--accent-glow); }
  .s-input::placeholder { color:var(--text-muted); }
  .s-btn {
    width:40px; height:40px; background:transparent; border:1.5px solid var(--accent);
    border-radius:var(--radius-sm); color:var(--accent); cursor:pointer;
    transition:var(--transition); flex-shrink:0;
    display:grid; place-items:center;
  }
  .s-btn:hover:not(:disabled) { background:var(--accent-light); border-color:var(--accent-hover); color:var(--accent-hover); transform:translateY(-2px); box-shadow:0 4px 12px var(--accent-glow); }
  .s-btn:active:not(:disabled) { transform:translateY(1px); box-shadow:none; }
  .s-btn:disabled { opacity:0.4; cursor:not-allowed; }
  .s-btn svg { width:18px; height:18px; }

  .s-loading {
    display:none; align-items:center; gap:8px;
    padding:8px 0 2px; font-size:12px; color:var(--text-muted);
  }
  .s-loading.show { display:flex; }
  .s-spinner {
    width:14px; height:14px; border:2px solid var(--border);
    border-top-color:var(--accent); border-radius:50%;
    animation:spin 0.8s linear infinite;
  }
  @keyframes spin { to { transform:rotate(360deg); } }
  @keyframes popIn {
    0% { opacity:0; transform:scale(0.8); }
    60% { transform:scale(1.06); }
    80% { transform:scale(0.97); }
    100% { opacity:1; transform:scale(1); }
  }
  @keyframes pulse {
    0% { transform:scale(1); }
    50% { transform:scale(1.3); }
    100% { transform:scale(1); }
  }
  @keyframes slideUp {
    from { opacity:0; transform:translateY(10px); }
    to { opacity:1; transform:translateY(0); }
  }
  .s-block { animation:slideUp 0.3s ease both; }
  .s-block:nth-child(1) { animation-delay:0.05s; }
  .s-block:nth-child(2) { animation-delay:0.1s; }
  .s-result.show { animation:slideUp 0.3s ease both; }
  .pulse-pop { animation:pulse 0.35s var(--spring); }

  .s-result { display:none; margin-top:8px; }
  .s-result.show { display:block; }
  .s-diff {
    background:var(--bg-body); border:1px solid var(--border);
    border-radius:var(--radius-sm); padding:8px 12px;
    font-size:12.5px; line-height:1.8; margin-bottom:6px;
  }
  .s-diff-del {
    background:var(--diff-del-bg); border-left:3px solid var(--diff-del-border);
    padding:2px 8px; margin:2px 0; border-radius:3px;
    text-decoration:line-through; color:#c0392b; font-size:12px;
  }
  .s-diff-add {
    background:var(--diff-add-bg); border-left:3px solid var(--diff-add-border);
    padding:2px 8px; margin:2px 0; border-radius:3px;
    color:#065f46; font-size:12px;
  }
  .s-comment {
    background:#fffbeb; border-left:3px solid #f59e0b;
    padding:6px 10px; border-radius:3px; margin-bottom:4px;
    font-size:12px; line-height:1.6; color:var(--text-secondary);
  }
  .s-comment-icon { font-weight:700; color:#d97706; margin-right:4px; }
  .s-no-feedback {
    background:var(--accent-light); border-left:3px solid var(--accent);
    padding:8px 12px; border-radius:3px; font-size:12px;
    color:var(--text-secondary); line-height:1.6;
  }

  /* ── Tooltip ── */
  .tooltip {
    display:none; position:fixed; z-index:1000; background:var(--bg-white);
    border:1px solid var(--border); border-radius:var(--radius);
    padding:14px 16px; box-shadow:var(--shadow-lg); min-width:180px; max-width:260px;
  }
  .tooltip.show { display:block; animation:popIn 0.35s var(--spring); }
  .tooltip-word { font-size:16px; font-weight:700; color:var(--accent); margin-bottom:6px; }
  .tooltip-meaning { font-size:14px; color:var(--text-primary); margin-bottom:12px; line-height:1.5; font-weight:600; }
  .tooltip-btn {
    width:100%; padding:7px 12px; background:var(--accent); border:none;
    border-radius:var(--radius-sm); color:#fff; font-size:12px;
    font-weight:600; cursor:pointer; transition:var(--transition);
  }
  .tooltip-btn:hover { background:var(--accent-hover); transform:translateY(-2px); box-shadow:0 4px 12px var(--accent-glow); }
  .tooltip-btn:active { transform:translateY(1px); box-shadow:none; }

  /* ── Modal ── */
  .modal-overlay {
    display:none; position:fixed; inset:0; z-index:2000;
    background:rgba(0,0,0,0.3); backdrop-filter:blur(4px); place-items:center;
  }
  .modal-overlay.show { display:grid; }
  .modal {
    background:var(--bg-white); border:1px solid var(--border); border-radius:20px;
    width:520px; max-width:92vw; max-height:80vh;
    display:flex; flex-direction:column; box-shadow:var(--shadow-lg);
    animation:modalIn 0.25s ease;
  }
  @keyframes modalIn {
    0% { opacity:0; transform:scale(0.85); }
    50% { transform:scale(1.03); }
    70% { transform:scale(0.98); }
    100% { opacity:1; transform:scale(1); }
  }
  .modal-header {
    display:flex; align-items:center; justify-content:space-between;
    padding:16px 20px; border-bottom:1px solid var(--border);
  }
  .modal-header h2 { font-size:15px; font-weight:700; }
  .modal-close {
    width:28px; height:28px; background:var(--bg-body); border:none;
    border-radius:8px; color:var(--text-secondary); font-size:16px;
    cursor:pointer; display:grid; place-items:center; transition:var(--transition);
  }
  .modal-close:hover { background:var(--danger); color:#fff; }
  .modal-body { padding:16px 20px; overflow-y:auto; flex:1; }
  .modal-body::-webkit-scrollbar { width:4px; }
  .modal-body::-webkit-scrollbar-thumb { background:var(--border); border-radius:3px; }
  .vocab-empty { text-align:center; padding:32px 0; color:var(--text-muted); font-size:13px; }
  .vocab-item {
    display:flex; align-items:flex-start; gap:12px; padding:10px 0;
    border-bottom:1px solid var(--border);
  }
  .vocab-item:last-child { border-bottom:none; }
  .vocab-info { flex:1; }
  .vocab-word { font-size:14px; font-weight:700; color:var(--accent); margin-bottom:2px; }
  .vocab-meaning { font-size:12.5px; color:var(--text-secondary); margin-bottom:2px; }
  .vocab-ctx { font-size:11px; color:var(--text-muted); font-style:italic; line-height:1.5; }
  .vocab-del {
    padding:4px 10px; background:transparent; border:1px solid var(--border);
    border-radius:var(--radius-sm); color:var(--text-muted); font-size:11px;
    cursor:pointer; transition:var(--transition); flex-shrink:0; margin-top:2px;
  }
  .vocab-del:hover { background:var(--danger); border-color:var(--danger); color:#fff; transform:translateY(-1px); }
  .vocab-del:active { transform:translateY(1px); }
  .toast {
    position:fixed; bottom:24px; left:50%;
    transform:translateX(-50%) translateY(70px);
    background:var(--text-primary); border-radius:var(--radius);
    padding:10px 20px; font-size:13px; font-weight:600; color:#fff;
    box-shadow:var(--shadow-md); z-index:3000; opacity:0;
    transition:transform 0.35s ease, opacity 0.35s ease;
  }
  .toast.show { opacity:1; transform:translateX(-50%) translateY(0); animation:popIn 0.4s var(--spring); }

  /* ── Thumbnail ── */
  .article-thumb {
    margin:0 24px 24px; flex-shrink:0;
  }
  .article-thumb img {
    max-width:100%; height:auto; display:block;
    border-radius:12px; box-shadow:var(--shadow-sm);
  }

  /* ── Mobile: panel toggle ── */
  .mobile-panel-toggle {
    display:none; flex-shrink:0; padding:8px 16px 0;
    background:var(--bg-body);
  }
  .mobile-panel-toggle .tabs { margin:0; }

  /* ── Floating vocab button (mobile) ── */
  .fab-vocab {
    display:none; position:fixed; bottom:20px; right:20px; z-index:900;
    width:52px; height:52px; border-radius:50%; border:none;
    background:var(--accent); color:#fff; box-shadow:0 4px 16px var(--accent-glow);
    cursor:pointer; transition:var(--transition);
  }
  .fab-vocab:active { transform:scale(0.92); }
  .fab-vocab svg { width:22px; height:22px; }

  /* ══════════════════════════════════════
     MOBILE RESPONSIVE ( < 768px )
     ══════════════════════════════════════ */
  @media (max-width:767px) {
    body { height:100vh; height:100dvh; }

    .header { padding:8px 14px; }
    .header h1 { font-size:14px; }
    .header .btn-icon-desktop { display:none; }

    .fab-vocab { display:grid; place-items:center; }

    /* Layout stacks vertically */
    .layout { flex-direction:column; }

    /* Sidebar → horizontal pill bar */
    .sidebar {
      width:100%; flex-direction:row; justify-content:center;
      border-right:none; border-bottom:1px solid var(--border);
      padding:8px 16px; gap:10px; overflow-x:auto;
      flex-shrink:0;
    }
    .sidebar-item { width:38px; height:38px; font-size:13px; flex-shrink:0; }

    /* Main stacks vertically */
    .main { flex-direction:column; flex:1; overflow:hidden; }

    /* Mobile panel toggle */
    .mobile-panel-toggle { display:flex; }

    /* Panels: show/hide via JS class */
    .panel { width:100%; }
    .panel-left { border-right:none; }
    .panel.mobile-hidden { display:none; }

    /* Adjust padding */
    .panel-header { padding:10px 16px 0; }
    .meta-box { margin:8px 16px 0; padding:10px 14px; }
    .meta-title { font-size:14px; }
    .meta-summary { font-size:12px; }
    .article-content { padding:10px 16px 16px; font-size:13.5px; line-height:1.8; }
    .article-thumb { margin:0 16px 16px; }

    .sentence-list { padding:10px 14px; gap:10px; }
    .s-block { padding:10px 12px; }
    .s-source { font-size:13px; }
    .s-input { font-size:12.5px; padding:8px 10px; min-height:38px; }
    .s-btn { width:38px; height:38px; }
    .s-btn svg { width:16px; height:16px; }

    .toast { bottom:80px; font-size:12px; padding:8px 16px; }
  }
</style>
</head>
<body>

<!-- Loading Screen -->
<div class="loading-screen" id="loadingScreen">
  <div class="loading-content">
    <div class="loading-logo">IEL</div>
    <div class="loading-dots"><span></span><span></span><span></span></div>
  </div>
</div>

<!-- Header -->
<header class="header" id="appHeader" style="display:none">
  <div class="header-left">
    <div class="logo">IEL</div>
    <h1>IEL</h1>
  </div>
  <div class="header-right">
    <button class="btn-icon btn-icon-desktop" onclick="openVocabModal()" title="단어장">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 19.5A2.5 2.5 0 016.5 17H20"/><path d="M6.5 2H20v20H6.5A2.5 2.5 0 014 19.5v-15A2.5 2.5 0 016.5 2z"/></svg>
    </button>
  </div>
</header>

<!-- Layout -->
<div class="layout" id="appLayout" style="display:none">
  <nav class="sidebar" id="sidebar"></nav>
  <div class="main">
    <div class="panel panel-left" id="panelLeft">
      <div class="panel-header">
        <div class="tabs">
          <button class="tab active" data-tab="en" onclick="switchTab('en')">English</button>
          <button class="tab" data-tab="ko" onclick="switchTab('ko')">Korean</button>
        </div>
      </div>
      <div class="meta-box" id="metaBox"></div>
      <div class="article-content" id="articleContent"></div>
    </div>
    <!-- Mobile panel toggle -->
    <div class="mobile-panel-toggle" id="mobilePanelToggle">
      <div class="tabs">
        <button class="tab active" data-mp="article" onclick="switchMobilePanel('article')">Article</button>
        <button class="tab" data-mp="practice" onclick="switchMobilePanel('practice')">Practice</button>
      </div>
    </div>
    <div class="panel panel-right mobile-hidden" id="panelRight">
      <div class="sentence-list" id="sentenceList"></div>
    </div>
  </div>
</div>

<!-- Floating vocab button (mobile) -->
<button class="fab-vocab" id="fabVocab" onclick="openVocabModal()" title="단어장">
  <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 19.5A2.5 2.5 0 016.5 17H20"/><path d="M6.5 2H20v20H6.5A2.5 2.5 0 014 19.5v-15A2.5 2.5 0 016.5 2z"/></svg>
</button>

<!-- Tooltip -->
<div class="tooltip" id="tooltip">
  <div class="tooltip-word" id="tooltipWord"></div>
  <div class="tooltip-meaning" id="tooltipMeaning"></div>
  <button class="tooltip-btn" onclick="addToVocab()">+ 단어장에 추가</button>
</div>

<!-- Vocab Modal -->
<div class="modal-overlay" id="vocabModal">
  <div class="modal">
    <div class="modal-header">
      <h2>나만의 단어장</h2>
      <button class="modal-close" onclick="closeVocabModal()">&times;</button>
    </div>
    <div class="modal-body" id="vocabList"></div>
  </div>
</div>
<div class="toast" id="toast"></div>

<script>
// ── Supabase ──
const SUPABASE_URL = "https://wwwwvdtuovcfsauekxrt.supabase.co";

// ── State ──
let articles = [];
let currentTab = 'en', currentDay = 0;
let selectedWord = '', selectedMeaning = '', selectedContext = '';

// ── State Persistence ──
const store = { inputs:{}, results:{} };

function loadStore() {
  try {
    const s = sessionStorage.getItem('iel');
    if (s) { const p = JSON.parse(s); Object.assign(store.inputs, p.inputs||{}); Object.assign(store.results, p.results||{}); }
  } catch(e){}
}
function saveStore() {
  try { sessionStorage.setItem('iel', JSON.stringify(store)); } catch(e){}
}
function sk(d,t,i) { return d+'_'+t+'_'+i; }
function onInput(idx, val) { store.inputs[sk(currentDay,currentTab,idx)] = val; saveStore(); }
function getInput(d,t,i) { return store.inputs[sk(d,t,i)] || ''; }
function saveResult(d,t,i,html) { store.results[sk(d,t,i)] = html; saveStore(); }
function getResult(d,t,i) { return store.results[sk(d,t,i)] || ''; }

// ── Fetch from Supabase ──
async function fetchArticles() {
  const { data, error } = await sb.from('articles').select('*').order('date', { ascending: false }).limit(3);
  if (error) throw new Error(error.message);
  if (!data || data.length === 0) return [];
  return data.map(row => ({
    id: row.id,
    title: row.title,
    summary: row.summary,
    difficulty: row.difficulty,
    sourceName: row.source_name,
    sourceUrl: row.source_url,
    date: row.date,
    image_url: row.image_url || null,
    content: typeof row.content === 'string' ? JSON.parse(row.content) : row.content,
  }));
}

// ── Word Lookup (sentence-pair based) ──
function findMatchInPairs(word) {
  const a = articles[currentDay];
  if (!a || !a.content) return null;
  const lower = word.toLowerCase();

  if (currentTab === 'en') {
    for (const pair of a.content) {
      const enWords = pair.en.toLowerCase().replace(/[.,;:!?'"()—\-]/g, '').split(/\s+/);
      if (enWords.includes(lower)) {
        const koWords = pair.ko.replace(/[.,;:!?'"()—\-]/g, '').split(/\s+/);
        const idx = enWords.indexOf(lower);
        const ratio = idx / enWords.length;
        const koIdx = Math.min(Math.round(ratio * koWords.length), koWords.length - 1);
        const candidate = koWords[koIdx];
        if (candidate) return { displayWord: word, meaning: candidate };
      }
    }
  } else {
    for (const pair of a.content) {
      const koWords = pair.ko.replace(/[.,;:!?'"()—\-]/g, '').split(/\s+/);
      const found = koWords.some(kw => kw.includes(word) || word.includes(kw));
      if (found) {
        const enWords = pair.en.toLowerCase().replace(/[.,;:!?'"()—\-]/g, '').split(/\s+/);
        let matchIdx = koWords.findIndex(kw => kw.includes(word) || word.includes(kw));
        if (matchIdx < 0) matchIdx = 0;
        const ratio = matchIdx / koWords.length;
        const enIdx = Math.min(Math.round(ratio * enWords.length), enWords.length - 1);
        const candidate = enWords[enIdx];
        if (candidate) return { displayWord: word, meaning: candidate };
      }
    }
  }
  return null;
}

// ── Render ──
function renderDifficulty(lv) {
  return '<span style="letter-spacing:-1px">'+'★'.repeat(lv)+'<span style="opacity:0.2">★</span>'.repeat(10-lv)+'</span> '+lv+'/10';
}
function renderMeta() {
  const a = articles[currentDay];
  document.getElementById('metaBox').innerHTML = `
    <div class="meta-title">${esc(a.title)}</div>
    <div class="meta-summary">${esc(a.summary)}</div>
    <div class="meta-tags">
      <span class="meta-tag difficulty">${renderDifficulty(a.difficulty)}</span>
      <span class="meta-tag"><a href="${esc(a.sourceUrl)}" target="_blank" rel="noopener">${esc(a.sourceName)}</a></span>
      <span class="meta-tag">${esc(a.date)}</span>
    </div>`;
}
function renderSidebar() {
  document.getElementById('sidebar').innerHTML = articles.map((a,i) => `
    <button class="sidebar-item${i===currentDay?' active':''}" onclick="selectDay(${i})" title="${esc(a.title)}">
      ${i+1}
    </button>`).join('');
}
function renderArticle() {
  const a = articles[currentDay];
  const pairs = a.content;
  const paras = []; let buf = [];
  pairs.forEach((p,i) => {
    buf.push(currentTab === 'en' ? p.en : p.ko);
    if ((i+1)%3===0 || i===pairs.length-1) { paras.push(buf.join(' ')); buf=[]; }
  });
  let html = paras.map(p=>`<p>${p}</p>`).join('');
  if (a.image_url) {
    html += `<div class="article-thumb"><img src="${esc(a.image_url)}" alt="${esc(a.title)}" onerror="this.parentElement.style.display='none'"></div>`;
  }
  document.getElementById('articleContent').innerHTML = html;
}
function renderSentences() {
  const a = articles[currentDay];
  const list = document.getElementById('sentenceList');
  const srcKey = currentTab === 'en' ? 'en' : 'ko';
  const d = currentDay, t = currentTab;

  list.innerHTML = a.content.map((pair, i) => {
    const savedVal = getInput(d,t,i);
    const savedRes = getResult(d,t,i);
    return `
    <div class="s-block" id="sb-${i}">
      <div class="s-source"><span class="s-num">${i+1}</span>${esc(pair[srcKey])}</div>
      <div class="s-input-row">
        <textarea class="s-input" id="si-${i}" rows="1"
          oninput="autoResize(this);onInput(${i},this.value)">${esc(savedVal)}</textarea>
        <button class="s-btn" id="sbtn-${i}" onclick="correctSentence(${i})" title="AI 교정">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 3l1.5 4.5L18 9l-4.5 1.5L12 15l-1.5-4.5L6 9l4.5-1.5z"/><path d="M19 2l.5 1.5L21 4l-1.5.5L19 6l-.5-1.5L17 4l1.5-.5z"/><path d="M5 18l.5 1.5L7 20l-1.5.5L5 22l-.5-1.5L3 20l1.5-.5z"/></svg>
        </button>
      </div>
      <div class="s-loading" id="sl-${i}"><div class="s-spinner"></div> 분석 중...</div>
      <div class="s-result${savedRes?' show':''}" id="sr-${i}">${savedRes}</div>
    </div>`;
  }).join('');

  a.content.forEach((_,i) => {
    const el = document.getElementById('si-'+i);
    if (el && el.value) autoResize(el);
  });
}
function autoResize(el) {
  el.style.height = 'auto';
  el.style.height = Math.min(el.scrollHeight, 80) + 'px';
}
function selectDay(i) {
  currentDay = i;
  renderSidebar(); renderArticle(); renderMeta(); renderSentences(); hideTooltip();
}
function switchTab(tab) {
  currentTab = tab;
  document.querySelectorAll('.panel-header .tab, .panel-left .tab').forEach(t => t.classList.toggle('active', t.dataset.tab===tab));
  renderArticle(); renderMeta(); renderSentences(); hideTooltip();
}

// ── Mobile Panel Toggle ──
function switchMobilePanel(panel) {
  const left = document.getElementById('panelLeft');
  const right = document.getElementById('panelRight');
  document.querySelectorAll('#mobilePanelToggle .tab').forEach(t => t.classList.toggle('active', t.dataset.mp===panel));
  if (panel === 'article') {
    left.classList.remove('mobile-hidden');
    right.classList.add('mobile-hidden');
  } else {
    left.classList.add('mobile-hidden');
    right.classList.remove('mobile-hidden');
  }
}

// ── Per-sentence AI Correction ──
function correctSentence(idx) {
  const input = document.getElementById('si-'+idx);
  if (!input.value.trim()) { showToast('먼저 번역/영작을 입력해 주세요.'); return; }
  const btn = document.getElementById('sbtn-'+idx);
  const loading = document.getElementById('sl-'+idx);
  const result = document.getElementById('sr-'+idx);
  btn.disabled = true;
  result.classList.remove('show'); result.innerHTML = '';
  loading.classList.add('show');

  setTimeout(() => {
    loading.classList.remove('show');
    const userText = input.value.trim();
    const pair = articles[currentDay].content[idx];
    const feedback = currentTab === 'en' ? pair.feedback_en_to_ko : pair.feedback_ko_to_en;

    let html;
    if (!feedback) {
      html = '<div class="s-no-feedback">이 문장의 피드백 데이터가 아직 준비되지 않았습니다. 파이프라인이 연결되면 자동으로 생성됩니다.</div>';
    } else {
      const comments = feedback.comments.map(c =>
        `<div class="s-comment"><span class="s-comment-icon">&#x1f4a1;</span>${esc(c)}</div>`
      ).join('');
      html = `<div class="s-diff">
        <div class="s-diff-del">- ${esc(userText)}</div>
        <div class="s-diff-add">+ ${esc(feedback.ideal)}</div>
      </div>${comments}`;
    }

    result.innerHTML = html;
    result.classList.add('show');
    btn.disabled = false;
    btn.classList.remove('pulse-pop');
    void btn.offsetWidth;
    btn.classList.add('pulse-pop');
    saveResult(currentDay, currentTab, idx, html);
  }, 1600);
}

// ── Tooltip ──
function hideTooltip() { document.getElementById('tooltip').classList.remove('show'); }
document.addEventListener('DOMContentLoaded', () => {
  document.getElementById('articleContent').addEventListener('dblclick', function(e) {
    const sel = window.getSelection(); const word = sel.toString().trim();
    if (!word || word.includes(' ')) return;
    const range = sel.getRangeAt(0);

    const match = findMatchInPairs(word);
    if (!match) return;

    selectedWord = match.displayWord;
    selectedMeaning = match.meaning;
    selectedContext = '';

    const tip = document.getElementById('tooltip');
    document.getElementById('tooltipWord').textContent = selectedWord;
    document.getElementById('tooltipMeaning').textContent = selectedMeaning;

    const rect = range.getBoundingClientRect();
    let left = rect.left + rect.width/2 - 120, top = rect.bottom + 10;
    if (left < 10) left = 10;
    if (left + 260 > window.innerWidth) left = window.innerWidth - 270;
    if (top + 160 > window.innerHeight) top = rect.top - 140;
    tip.style.left = left+'px'; tip.style.top = top+'px';
    tip.classList.add('show');
  });
  document.addEventListener('click', function(e) {
    if (!e.target.closest('.tooltip') && !window.getSelection().toString().trim()) hideTooltip();
  });
});

// ── Supabase CRUD ──
async function addToVocab() {
  hideTooltip();
  try {
    const { error } = await sb.from('vocabulary').insert({ word:selectedWord, meaning:selectedMeaning, context:selectedContext });
    if (error) { showToast('저장 실패: '+error.message); }
    else {
      showToast(`"${selectedWord}" 단어장에 추가되었습니다.`);
      const tooltipBtn = document.querySelector('.tooltip-btn');
      if (tooltipBtn) { tooltipBtn.classList.remove('pulse-pop'); void tooltipBtn.offsetWidth; tooltipBtn.classList.add('pulse-pop'); }
    }
  } catch(e) {
    showToast('서버 연결 실패 — Supabase 프로젝트 상태를 확인해 주세요.');
    console.error('addToVocab network error:', e);
  }
}
async function openVocabModal() {
  document.getElementById('vocabModal').classList.add('show');
  await loadVocab();
}
function closeVocabModal() { document.getElementById('vocabModal').classList.remove('show'); }
document.getElementById('vocabModal').addEventListener('click', function(e) { if (e.target===this) closeVocabModal(); });

async function loadVocab() {
  const list = document.getElementById('vocabList');
  list.innerHTML = '<div class="vocab-empty">불러오는 중...</div>';
  let data, error;
  try {
    ({data, error} = await sb.from('vocabulary').select('*').order('created_at',{ascending:false}));
  } catch(e) {
    list.innerHTML = '<div class="vocab-empty">서버에 연결할 수 없습니다.<br>Supabase 프로젝트 상태를 확인해 주세요.</div>';
    console.error('loadVocab network error:', e);
    return;
  }
  if (error) { list.innerHTML = `<div class="vocab-empty">조회 실패: ${error.message}</div>`; return; }
  if (!data || data.length===0) {
    list.innerHTML = '<div class="vocab-empty">저장된 단어가 없습니다.<br>아티클에서 단어를 더블 클릭하여 추가해 보세요.</div>';
    return;
  }
  list.innerHTML = data.map(item => `
    <div class="vocab-item">
      <div class="vocab-info">
        <div class="vocab-word">${esc(item.word)}</div>
        <div class="vocab-meaning">${esc(item.meaning)}</div>
        ${item.context ? `<div class="vocab-ctx">${esc(item.context)}</div>` : ''}
      </div>
      <button class="vocab-del" onclick="deleteVocab(${item.id})">삭제</button>
    </div>`).join('');
}
async function deleteVocab(id) {
  try {
    const { error } = await sb.from('vocabulary').delete().eq('id', id);
    if (error) { showToast('삭제 실패: '+error.message); }
    else { showToast('단어가 삭제되었습니다.'); await loadVocab(); }
  } catch(e) {
    showToast('서버 연결 실패 — Supabase 프로젝트 상태를 확인해 주세요.');
    console.error('deleteVocab network error:', e);
  }
}

// ── Utilities ──
function esc(s) { const d = document.createElement('div'); d.textContent = s; return d.innerHTML; }
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2500);
}

// ── Init ──
async function init() {
  loadStore();
  try {
    articles = await fetchArticles();
  } catch(e) {
    console.error('fetchArticles error:', e);
    articles = [];
  }
  document.getElementById('loadingScreen').classList.add('hide');
  document.getElementById('appHeader').style.display = '';
  document.getElementById('appLayout').style.display = '';
  if (articles.length === 0) {
    document.getElementById('sidebar').innerHTML = '';
    document.getElementById('metaBox').innerHTML = '<div style="text-align:center;padding:24px;color:var(--text-muted);font-size:13px">오늘의 아티클이 아직 준비되지 않았습니다.<br>매일 오전 7시에 새로운 기사가 업데이트됩니다.</div>';
    document.getElementById('articleContent').innerHTML = '';
    document.getElementById('sentenceList').innerHTML = '';
    return;
  }
  renderSidebar(); renderArticle(); renderMeta(); renderSentences();
}
init();
