<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>IEL</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
/* ── Reset & Design Tokens ── */
*, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }
:root {
  --bg:#f5f6f8; --surface:#fff; --border:#e2e4e9;
  --text:#1a1d27; --text-sub:#5a5f72; --text-muted:#9298a8;
  --accent:#10b981; --accent-hover:#059669;
  --accent-glow:rgba(16,185,129,.15); --accent-light:#ecfdf5;
  --danger:#e74c5c;
  --diff-add-bg:rgba(16,185,129,.10); --diff-add:#10b981;
  --diff-del-bg:rgba(231,76,92,.08); --diff-del:#e74c5c;
  --r:16px; --r-sm:10px;
  --sh-sm:0 1px 3px rgba(0,0,0,.06); --sh-md:0 4px 16px rgba(0,0,0,.08);
  --sh-lg:0 12px 40px rgba(0,0,0,.12);
  --ease:.2s ease; --spring:cubic-bezier(.34,1.56,.64,1);
}
body {
  font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,'Noto Sans KR',sans-serif;
  background:var(--bg); color:var(--text);
  height:100vh; overflow:hidden; display:flex; flex-direction:column;
}

/* ── Animations ── */
@keyframes pop  { 0%{opacity:0;transform:scale(.8)} 60%{transform:scale(1.06)} 80%{transform:scale(.97)} 100%{opacity:1;transform:scale(1)} }
@keyframes pulse { 0%{transform:scale(1)} 50%{transform:scale(1.3)} 100%{transform:scale(1)} }
@keyframes slide { from{opacity:0;transform:translateY(10px)} to{opacity:1;transform:translateY(0)} }
@keyframes spin  { to{transform:rotate(360deg)} }
@keyframes dot   { 0%,80%,100%{opacity:.2;transform:scale(.8)} 40%{opacity:1;transform:scale(1.1)} }
@keyframes sparkle { 0%{opacity:0;transform:translateX(-6px) scale(.5)} 60%{transform:translateX(2px) scale(1.15)} 100%{opacity:1;transform:translateX(0) scale(1)} }
@keyframes modal { 0%{opacity:0;transform:scale(.85)} 50%{transform:scale(1.03)} 70%{transform:scale(.98)} 100%{opacity:1;transform:scale(1)} }

/* ── Loading ── */
.loading { position:fixed; inset:0; z-index:9999; background:var(--surface); display:grid; place-items:center; }
.loading.hide { display:none; }
.loading-logo {
  width:56px; height:56px; background:var(--accent); border-radius:18px;
  display:grid; place-items:center; font-weight:800; font-size:18px;
  color:#fff; margin:0 auto 24px; animation:pop .6s var(--spring) both;
}
.loading-dots { display:flex; gap:6px; justify-content:center; }
.loading-dots span { width:8px; height:8px; border-radius:50%; background:var(--accent); animation:dot 1.2s ease infinite; }
.loading-dots span:nth-child(2) { animation-delay:.15s; }
.loading-dots span:nth-child(3) { animation-delay:.3s; }

/* ── Header ── */
.header {
  display:flex; align-items:center; justify-content:space-between;
  padding:10px 20px; background:var(--surface);
  border-bottom:1px solid var(--border); flex-shrink:0;
}
.header-left { display:flex; align-items:center; gap:10px; }
.logo {
  width:30px; height:30px; background:var(--accent); border-radius:10px;
  display:grid; place-items:center; font-weight:800; font-size:11px; color:#fff;
}
.header h1 { font-size:15px; font-weight:700; }
.btn-icon {
  width:36px; height:36px; background:var(--surface); border:1px solid var(--border);
  border-radius:var(--r-sm); color:var(--text-sub);
  cursor:pointer; transition:var(--ease); display:grid; place-items:center;
}
.btn-icon:hover { border-color:var(--accent); color:var(--accent); background:var(--accent-light); transform:translateY(-2px); box-shadow:0 4px 12px var(--accent-glow); }
.btn-icon:active { transform:translateY(1px); box-shadow:none; }
.btn-icon svg { width:18px; height:18px; }

/* ── Layout ── */
.layout { display:flex; flex:1; overflow:hidden; }

/* ── Sidebar ── */
.sidebar {
  width:60px; background:var(--surface); border-right:1px solid var(--border);
  display:flex; flex-direction:column; align-items:center;
  padding:12px 0; gap:8px; overflow-y:auto; flex-shrink:0;
}
.sidebar::-webkit-scrollbar { width:0; }
.pill {
  width:40px; height:40px; border-radius:50%; border:2px solid var(--border);
  background:var(--surface); color:var(--text-sub);
  font-size:14px; font-weight:700; cursor:pointer;
  transition:var(--ease); display:grid; place-items:center;
}
.pill:hover { border-color:var(--accent); color:var(--accent); background:var(--accent-light); transform:translateY(-2px); }
.pill:active { transform:translateY(1px); }
.pill.on { background:var(--accent); color:#fff; border-color:var(--accent); box-shadow:0 3px 12px var(--accent-glow); animation:pop .3s var(--spring); }

/* ── Panels ── */
.main { display:flex; flex:1; overflow:hidden; }
.panel { width:50%; display:flex; flex-direction:column; overflow:hidden; }
.panel-l { border-right:1px solid var(--border); background:var(--surface); }
.panel-r { background:var(--bg); }
.panel-head { padding:14px 24px 0; flex-shrink:0; }

/* ── Tabs ── */
.tabs { display:flex; gap:4px; background:var(--bg); border-radius:var(--r-sm); padding:3px; }
.tab {
  flex:1; padding:8px 14px; background:transparent; border:none;
  border-radius:5px; color:var(--text-muted); font-size:13px;
  font-weight:600; cursor:pointer; transition:var(--ease);
}
.tab:hover { color:var(--text); transform:translateY(-1px); }
.tab:active { transform:translateY(1px); }
.tab.on { background:var(--accent); color:#fff; box-shadow:0 2px 8px var(--accent-glow); animation:pop .25s var(--spring); }

/* ── Meta ── */
.meta {
  margin:12px 24px 0; padding:14px 18px; background:var(--bg);
  border:1px solid var(--border); border-radius:var(--r); flex-shrink:0;
}
.meta-title { font-size:15px; font-weight:700; line-height:1.4; margin-bottom:6px; }
.meta-summary { font-size:12.5px; color:var(--text-sub); line-height:1.6; margin-bottom:8px; }
.meta-tags { display:flex; flex-wrap:wrap; gap:6px; }
.tag {
  display:inline-flex; align-items:center; gap:4px; padding:3px 9px;
  background:var(--surface); border:1px solid var(--border); border-radius:20px;
  font-size:11px; color:var(--text-sub); font-weight:500; white-space:nowrap;
}
.tag.diff { border-color:var(--accent); color:var(--accent); font-weight:600; }
.tag a { color:var(--accent); text-decoration:none; font-weight:600; }
.tag a:hover { text-decoration:underline; }

/* ── Article Content ── */
.article {
  flex:1; padding:12px 24px 24px; overflow-y:auto; line-height:1.9; font-size:14.5px;
}
.article p { margin-bottom:14px; }
.article::-webkit-scrollbar { width:4px; }
.article::-webkit-scrollbar-thumb { background:var(--border); border-radius:3px; }
.thumb { margin:0 24px 24px; background:transparent; }
.thumb img { width:100%; height:auto; display:block; border-radius:12px; box-shadow:var(--sh-sm); }

/* ── Clickable Words ── */
.w { cursor:pointer; border-radius:3px; transition:background .15s; }
.w:hover { background:var(--accent-glow); }
.w:active { background:rgba(16,185,129,.25); }

/* ── Sentence Practice ── */
.sentences { flex:1; padding:14px 20px; overflow-y:auto; display:flex; flex-direction:column; gap:14px; }
.sentences::-webkit-scrollbar { width:4px; }
.sentences::-webkit-scrollbar-thumb { background:var(--border); border-radius:3px; }
.s-block { background:var(--surface); border:1px solid var(--border); border-radius:var(--r); padding:12px 14px; box-shadow:var(--sh-sm); animation:slide .3s ease both; }
.s-block:nth-child(1) { animation-delay:.05s; }
.s-block:nth-child(2) { animation-delay:.1s; }
.s-num {
  display:inline-block; width:20px; height:20px; border-radius:50%;
  background:var(--accent-light); color:var(--accent);
  font-size:10px; font-weight:700; text-align:center; line-height:20px; margin-right:6px;
}
.s-text { font-size:13.5px; line-height:1.7; margin-bottom:8px; }
.s-row { display:flex; gap:6px; align-items:flex-start; }
.s-input {
  flex:1; padding:9px 12px; border:1.5px solid var(--border);
  border-radius:var(--r-sm); font-size:13px; font-family:inherit;
  line-height:1.6; color:var(--text); background:var(--bg);
  resize:none; min-height:40px; max-height:80px;
  transition:border-color var(--ease), box-shadow var(--ease);
}
.s-input:focus { outline:none; border-color:var(--accent); box-shadow:0 0 0 3px var(--accent-glow); }
.s-input::placeholder { color:var(--text-muted); }
.s-btn {
  width:40px; height:40px; background:transparent; border:1.5px solid var(--accent);
  border-radius:var(--r-sm); color:var(--accent); cursor:pointer;
  transition:var(--ease); flex-shrink:0; display:grid; place-items:center;
}
.s-btn:hover:not(:disabled) { background:var(--accent-light); transform:translateY(-2px); box-shadow:0 4px 12px var(--accent-glow); }
.s-btn:active:not(:disabled) { transform:translateY(1px); box-shadow:none; }
.s-btn:disabled { opacity:.4; cursor:not-allowed; }
.s-btn svg { width:18px; height:18px; }
.s-loading { display:none; align-items:center; gap:8px; padding:8px 0 2px; font-size:12px; color:var(--text-muted); }
.s-loading.show { display:flex; }
.s-spinner { width:14px; height:14px; border:2px solid var(--border); border-top-color:var(--accent); border-radius:50%; animation:spin .8s linear infinite; }
.s-result { display:none; margin-top:8px; }
.s-result.show { display:block; animation:slide .3s ease both; }
.pulse-pop { animation:pulse .35s var(--spring); }

/* ── Grading: Perfect ── */
.s-perfect {
  background:var(--accent-light); border:1.5px solid var(--accent);
  border-radius:var(--r-sm); padding:10px 14px; display:flex; align-items:center; gap:10px;
}
.s-perfect-icon { font-size:22px; animation:pop .4s var(--spring) both; }
.s-perfect-text { flex:1; }
.s-perfect-label { font-size:13px; font-weight:700; color:var(--accent); }
.s-perfect-score { font-size:11px; color:var(--text-sub); margin-top:2px; }

/* ── Grading: Good ── */
.s-good {
  background:#f0fdf4; border:1.5px solid #86efac;
  border-radius:var(--r-sm); padding:10px 14px; display:flex; align-items:center; gap:10px;
}
.s-good-icon { font-size:22px; animation:pop .4s var(--spring) both; }
.s-good-text { flex:1; }
.s-good-label { font-size:13px; font-weight:700; color:#16a34a; }
.s-good-score { font-size:11px; color:var(--text-sub); margin-top:2px; }

/* ── Grading: Needs Improvement ── */
.s-diff { background:var(--bg); border:1px solid var(--border); border-radius:var(--r-sm); padding:8px 12px; font-size:12.5px; line-height:1.8; margin-bottom:6px; }
.s-diff-del { background:var(--diff-del-bg); border-left:3px solid var(--diff-del); padding:2px 8px; margin:2px 0; border-radius:3px; text-decoration:line-through; color:#c0392b; font-size:12px; }
.s-diff-add { background:var(--diff-add-bg); border-left:3px solid var(--diff-add); padding:2px 8px; margin:2px 0; border-radius:3px; color:#065f46; font-size:12px; }
.s-improve-head { display:flex; align-items:center; gap:8px; margin-bottom:6px; }
.s-improve-icon { font-size:18px; }
.s-improve-label { font-size:13px; font-weight:700; color:var(--danger); }
.s-improve-score { font-size:11px; color:var(--text-sub); }

/* ── Shared: Tips & Suggestion ── */
.s-tip { background:#fffbeb; border-left:3px solid #f59e0b; padding:6px 10px; border-radius:3px; margin-bottom:4px; font-size:12px; line-height:1.6; color:var(--text-sub); }
.s-tip b { color:#d97706; margin-right:4px; }
.s-alt { background:#f0f9ff; border-left:3px solid #38bdf8; padding:6px 10px; border-radius:3px; margin-top:6px; font-size:12px; line-height:1.6; color:var(--text-sub); }
.s-alt b { color:#0284c7; margin-right:4px; }
.s-empty { background:var(--accent-light); border-left:3px solid var(--accent); padding:8px 12px; border-radius:3px; font-size:12px; color:var(--text-sub); line-height:1.6; }

/* ── Confetti ── */
@keyframes confettiFall { 0%{transform:translateY(-10px) rotate(0deg);opacity:1} 100%{transform:translateY(120px) rotate(720deg);opacity:0} }
.confetti-wrap { position:absolute; top:0; left:0; right:0; height:0; overflow:visible; pointer-events:none; z-index:10; }
.confetti {
  position:absolute; width:6px; height:6px; border-radius:1px;
  animation:confettiFall 1.2s ease-out forwards;
}
.s-block { position:relative; overflow:hidden; }

/* ── Tooltip ── */
.tooltip {
  display:none; position:fixed; z-index:5000; background:var(--surface);
  border:1px solid var(--border); border-radius:var(--r);
  padding:14px 16px; box-shadow:var(--sh-lg); min-width:180px; max-width:260px;
}
.tooltip.show { display:block; animation:pop .35s var(--spring); }
.tooltip-pair { display:flex; align-items:center; gap:8px; margin-bottom:12px; flex-wrap:wrap; }
.tooltip-word { font-size:16px; font-weight:700; color:var(--accent); }
.tooltip-arrow { display:flex; align-items:center; animation:sparkle .4s var(--spring) both; }
.tooltip-meaning { font-size:16px; font-weight:700; color:var(--text); }
.tooltip-btn {
  width:100%; padding:7px 12px; background:var(--accent); border:none;
  border-radius:var(--r-sm); color:#fff; font-size:12px;
  font-weight:600; cursor:pointer; transition:var(--ease);
}
.tooltip-btn:hover { background:var(--accent-hover); transform:translateY(-2px); box-shadow:0 4px 12px var(--accent-glow); }
.tooltip-btn:active { transform:translateY(1px); box-shadow:none; }

/* ── Modal ── */
.overlay {
  display:none; position:fixed; inset:0; z-index:6000;
  background:rgba(0,0,0,.3); backdrop-filter:blur(4px); place-items:center;
}
.overlay.show { display:grid; }
.modal {
  background:var(--surface); border:1px solid var(--border); border-radius:20px;
  width:520px; max-width:92vw; max-height:80vh;
  display:flex; flex-direction:column; box-shadow:var(--sh-lg); animation:modal .25s ease;
}
.modal-head { display:flex; align-items:center; justify-content:space-between; padding:16px 20px; border-bottom:1px solid var(--border); }
.modal-head h2 { font-size:15px; font-weight:700; }
.modal-close {
  width:28px; height:28px; background:var(--bg); border:none;
  border-radius:8px; color:var(--text-sub); font-size:16px;
  cursor:pointer; display:grid; place-items:center; transition:var(--ease);
}
.modal-close:hover { background:var(--danger); color:#fff; }
.modal-body { padding:16px 20px; overflow-y:auto; flex:1; }
.modal-body::-webkit-scrollbar { width:4px; }
.modal-body::-webkit-scrollbar-thumb { background:var(--border); border-radius:3px; }
.v-empty { text-align:center; padding:32px 0; color:var(--text-muted); font-size:13px; }
.v-item { display:flex; align-items:flex-start; gap:12px; padding:10px 0; border-bottom:1px solid var(--border); }
.v-item:last-child { border-bottom:none; }
.v-info { flex:1; }
.v-word { font-size:14px; font-weight:700; color:var(--accent); margin-bottom:2px; }
.v-mean { font-size:12.5px; color:var(--text-sub); margin-bottom:2px; }
.v-ctx { font-size:11px; color:var(--text-muted); font-style:italic; line-height:1.5; }
.v-del {
  padding:4px 10px; background:transparent; border:1px solid var(--border);
  border-radius:var(--r-sm); color:var(--text-muted); font-size:11px;
  cursor:pointer; transition:var(--ease); flex-shrink:0; margin-top:2px;
}
.v-del:hover { background:var(--danger); border-color:var(--danger); color:#fff; transform:translateY(-1px); }

/* ── Toast ── */
.toast {
  position:fixed; bottom:24px; left:50%;
  transform:translateX(-50%) translateY(70px);
  background:var(--text); border-radius:var(--r);
  padding:10px 20px; font-size:13px; font-weight:600; color:#fff;
  box-shadow:var(--sh-md); z-index:7000; opacity:0;
  transition:transform .35s ease, opacity .35s ease;
}
.toast.show { opacity:1; transform:translateX(-50%) translateY(0); animation:pop .4s var(--spring); }

/* ── FAB (mobile vocab) ── */
.fab {
  display:none; position:fixed; bottom:20px; right:20px; z-index:900;
  width:52px; height:52px; border-radius:50%; border:none;
  background:var(--accent); color:#fff; box-shadow:0 4px 16px var(--accent-glow);
  cursor:pointer; transition:var(--ease);
}
.fab:active { transform:scale(.92); }
.fab svg { width:22px; height:22px; }

/* ── Mobile ( < 768px ) ── */
@media (max-width:767px) {
  body { height:auto; overflow:auto; }
  .header { padding:8px 14px; }
  .header h1 { font-size:14px; }
  .header .desktop-only { display:none; }
  .fab { display:grid; place-items:center; }

  .layout { flex-direction:column; overflow:visible; }
  .sidebar {
    width:100%; flex-direction:row; justify-content:center;
    border-right:none; border-bottom:1px solid var(--border);
    padding:8px 16px; gap:10px; overflow-x:auto;
    position:sticky; top:0; z-index:100; background:var(--surface);
  }
  .pill { width:38px; height:38px; font-size:13px; flex-shrink:0; }

  .main { flex-direction:column; flex:none; overflow:visible; }
  .panel { width:100%; overflow:visible; flex:none; }
  .panel-l { border-right:none; }
  .thumb { display:none; }
  .article { overflow:visible; flex:none; }

  .panel-r { border-top:3px solid var(--accent); background:linear-gradient(180deg, var(--accent-light) 0%, var(--bg) 120px); }
  .sentences { overflow:visible; flex:none; }

  .panel-head { padding:10px 16px 0; }
  .meta { margin:8px 16px 0; padding:10px 14px; }
  .meta-title { font-size:14px; }
  .meta-summary { font-size:12px; }
  .article { padding:10px 16px 16px; font-size:13.5px; line-height:1.8; }
  .sentences { padding:10px 14px; gap:10px; }
  .s-block { padding:10px 12px; }
  .s-text { font-size:13px; }
  .s-input { font-size:12.5px; padding:8px 10px; min-height:38px; }
  .s-btn { width:38px; height:38px; }
  .s-btn svg { width:16px; height:16px; }
  .toast { bottom:80px; font-size:12px; padding:8px 16px; }
}
</style>
</head>
<body>

<div class="loading" id="loader">
  <div style="text-align:center">
    <div class="loading-logo">IEL</div>
    <div class="loading-dots"><span></span><span></span><span></span></div>
  </div>
</div>

<header class="header" id="hdr" style="display:none">
  <div class="header-left">
    <div class="logo">IEL</div>
    <h1>IEL</h1>
  </div>
  <button class="btn-icon desktop-only" onclick="IEL.openVocab()" title="단어장">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 19.5A2.5 2.5 0 016.5 17H20"/><path d="M6.5 2H20v20H6.5A2.5 2.5 0 014 19.5v-15A2.5 2.5 0 016.5 2z"/></svg>
  </button>
</header>

<div class="layout" id="app" style="display:none">
  <nav class="sidebar" id="sidebar"></nav>
  <div class="main">
    <div class="panel panel-l">
      <div class="panel-head">
        <div class="tabs" id="tabs">
          <button class="tab on" data-tab="en">English</button>
          <button class="tab" data-tab="ko">Korean</button>
        </div>
      </div>
      <div class="meta" id="meta"></div>
      <div class="article" id="article"></div>
    </div>
    <div class="panel panel-r">
      <div class="sentences" id="sentences"></div>
    </div>
  </div>
</div>

<button class="fab" onclick="IEL.openVocab()" title="단어장">
  <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 19.5A2.5 2.5 0 016.5 17H20"/><path d="M6.5 2H20v20H6.5A2.5 2.5 0 014 19.5v-15A2.5 2.5 0 016.5 2z"/></svg>
</button>

<div class="tooltip" id="tip">
  <div class="tooltip-pair">
    <span class="tooltip-word" id="tipW"></span>
    <span class="tooltip-arrow" id="tipArr">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="var(--accent)" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12h14"/><path d="M13 6l6 6-6 6"/></svg>
    </span>
    <span class="tooltip-meaning" id="tipM"></span>
  </div>
  <button class="tooltip-btn" id="tipBtn">+ 단어장에 추가</button>
</div>

<div class="overlay" id="vocabOverlay">
  <div class="modal">
    <div class="modal-head">
      <h2>나만의 단어장</h2>
      <button class="modal-close" id="vocabClose">&times;</button>
    </div>
    <div class="modal-body" id="vocabList"></div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const IEL = (() => {
  // ── Config ──
  const SB_URL = "https://wwwwvdtuovcfsauekxrt.supabase.co";
  const SB_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Ind3d3d2ZHR1b3ZjZnNhdWVreHJ0Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzc4MTIxOTksImV4cCI6MjA5MzM4ODE5OX0.xYeW0i95Nidv6BTiF2DhIHXgykRPrMLLxdXK7AfclkU";
  const sb = supabase.createClient(SB_URL, SB_KEY);

  // ── State ──
  let articles = [], tab = 'en', day = 0;
  let tipWord = '', tipMeaning = '';
  const store = { inputs: {}, results: {} };

  // ── DOM Cache ──
  const $ = id => document.getElementById(id);
  const esc = s => { const d = document.createElement('div'); d.textContent = s; return d.innerHTML; };

  // ── Session Persistence ──
  const key = (d, t, i) => `${d}_${t}_${i}`;

  function loadStore() {
    try {
      const s = sessionStorage.getItem('iel');
      if (s) { const p = JSON.parse(s); Object.assign(store.inputs, p.inputs || {}); Object.assign(store.results, p.results || {}); }
    } catch {}
  }

  function saveStore() {
    try { sessionStorage.setItem('iel', JSON.stringify(store)); } catch {}
  }

  // ── Data ──
  async function fetchArticles() {
    const { data, error } = await sb.from('articles').select('*').order('date', { ascending: false }).limit(3);
    if (error) throw new Error(error.message);
    return (data || []).map(r => ({
      id: r.id, title: r.title, summary: r.summary, difficulty: r.difficulty,
      sourceName: r.source_name, sourceUrl: r.source_url, date: r.date,
      imageUrl: r.image_url || null,
      content: typeof r.content === 'string' ? JSON.parse(r.content) : r.content,
    }));
  }

  // ── Word Lookup ──
  function lookup(word) {
    const a = articles[day];
    if (!a?.content) return null;
    const lower = word.toLowerCase();

    for (const pair of a.content) {
      const wm = pair.word_map;
      if (!wm) continue;

      if (tab === 'en') {
        if (wm[lower]) return { word, meaning: wm[lower] };
        for (const [k, v] of Object.entries(wm)) {
          if (lower.startsWith(k) || k.startsWith(lower)) return { word, meaning: v };
        }
      } else {
        for (const [k, v] of Object.entries(wm)) {
          if (v === word || word.includes(v) || v.includes(word)) return { word, meaning: k };
        }
      }
    }
    return null;
  }

  // ── Render Helpers ──
  function stars(lv) {
    return `<span style="letter-spacing:-1px">${'★'.repeat(lv)}<span style="opacity:.2">${'★'.repeat(10 - lv)}</span></span> ${lv}/10`;
  }

  function wrapWords(text) {
    return text.replace(/(\S+)/g, m => {
      const clean = m.replace(/[^a-zA-Z0-9가-힣ㄱ-ㅎㅏ-ㅣ]/g, '');
      return `<span class="w" data-word="${esc(clean)}">${esc(m)}</span>`;
    });
  }

  // ── Renderers ──
  function renderSidebar() {
    $('sidebar').innerHTML = articles.map((a, i) =>
      `<button class="pill${i === day ? ' on' : ''}" data-day="${i}" title="${esc(a.title)}">${i + 1}</button>`
    ).join('');
  }

  function renderMeta() {
    const a = articles[day];
    $('meta').innerHTML =
      `<div class="meta-title">${esc(a.title)}</div>` +
      `<div class="meta-summary">${esc(a.summary)}</div>` +
      `<div class="meta-tags">` +
        `<span class="tag diff">${stars(a.difficulty)}</span>` +
        `<span class="tag"><a href="${esc(a.sourceUrl)}" target="_blank" rel="noopener">${esc(a.sourceName)}</a></span>` +
        `<span class="tag">${esc(a.date)}</span>` +
      `</div>`;
  }

  function renderArticle() {
    const a = articles[day];
    const pairs = a.content;
    const perPara = Math.ceil(pairs.length / 3);
    const paras = [];
    let buf = [];

    pairs.forEach((p, i) => {
      buf.push(wrapWords(tab === 'en' ? p.en : p.ko));
      if (buf.length >= perPara || i === pairs.length - 1) {
        paras.push(buf.join(' '));
        buf = [];
      }
    });

    let html = paras.map(p => `<p>${p}</p>`).join('');
    if (a.imageUrl) {
      html += `<div class="thumb"><img src="${esc(a.imageUrl)}" alt="${esc(a.title)}" onerror="this.parentElement.style.display='none'"></div>`;
    }
    $('article').innerHTML = html;
  }

  function renderSentences() {
    const a = articles[day];
    const src = tab === 'en' ? 'en' : 'ko';
    const d = day, t = tab;

    $('sentences').innerHTML = a.content.map((pair, i) => {
      const saved = store.inputs[key(d, t, i)] || '';
      const res = store.results[key(d, t, i)] || '';
      return `
      <div class="s-block" id="sb${i}">
        <div class="s-text"><span class="s-num">${i + 1}</span>${esc(pair[src])}</div>
        <div class="s-row">
          <textarea class="s-input" id="si${i}" rows="1" data-idx="${i}">${esc(saved)}</textarea>
          <button class="s-btn" id="sb${i}b" data-correct="${i}" title="AI 교정">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 3l1.5 4.5L18 9l-4.5 1.5L12 15l-1.5-4.5L6 9l4.5-1.5z"/><path d="M19 2l.5 1.5L21 4l-1.5.5L19 6l-.5-1.5L17 4l1.5-.5z"/><path d="M5 18l.5 1.5L7 20l-1.5.5L5 22l-.5-1.5L3 20l1.5-.5z"/></svg>
          </button>
        </div>
        <div class="s-loading" id="sl${i}"><div class="s-spinner"></div> 분석 중...</div>
        <div class="s-result${res ? ' show' : ''}" id="sr${i}">${res}</div>
      </div>`;
    }).join('');

    // 저장된 입력이 있으면 높이 조정
    a.content.forEach((_, i) => {
      const el = $('si' + i);
      if (el?.value) autoResize(el);
    });
  }

  function renderAll() {
    renderSidebar();
    renderMeta();
    renderArticle();
    renderSentences();
    hideTooltip();
  }

  // ── Actions ──
  function autoResize(el) {
    el.style.height = 'auto';
    el.style.height = Math.min(el.scrollHeight, 80) + 'px';
  }

  function selectDay(i) { day = i; renderAll(); }

  function switchTab(t) {
    tab = t;
    document.querySelectorAll('#tabs .tab').forEach(el => el.classList.toggle('on', el.dataset.tab === t));
    renderAll();
  }

  // ── Grading ──
  function normalize(s) {
    return s.toLowerCase().replace(/[^\w가-힣ㄱ-ㅎㅏ-ㅣ\s]/g, '').replace(/\s+/g, ' ').trim();
  }

  function similarity(a, b) {
    const na = normalize(a), nb = normalize(b);
    if (na === nb) return 1;
    const wa = na.split(' '), wb = nb.split(' ');
    const set = new Set(wb);
    const overlap = wa.filter(w => set.has(w)).length;
    return overlap / Math.max(wa.length, wb.length);
  }

  function grade(userText, pair) {
    const fb = tab === 'en' ? pair.feedback_en_to_ko : pair.feedback_ko_to_en;
    const ref = tab === 'en' ? pair.ko : pair.en;
    if (!fb) return { status: 'Good', score: 70, feedback: '피드백 데이터 없이 평가합니다.', alternative: null, diff: null, comments: [] };

    const simRef = similarity(userText, ref);
    const simIdeal = similarity(userText, fb.ideal);
    const best = Math.max(simRef, simIdeal);

    let status, score;
    if (best >= 0.8) { status = 'Perfect'; score = Math.round(85 + best * 15); }
    else if (best >= 0.5) { status = 'Good'; score = Math.round(50 + best * 40); }
    else { status = 'Needs Improvement'; score = Math.round(best * 60); }

    return {
      status, score,
      feedback: fb.comments?.[0] || '',
      alternative: (status !== 'Perfect' && fb.ideal) ? fb.ideal : null,
      diff: status === 'Needs Improvement' ? fb.ideal : null,
      comments: fb.comments || [],
    };
  }

  function spawnConfetti(container) {
    const wrap = document.createElement('div');
    wrap.className = 'confetti-wrap';
    const colors = ['#10b981','#f59e0b','#3b82f6','#ec4899','#8b5cf6','#ef4444'];
    for (let i = 0; i < 20; i++) {
      const c = document.createElement('div');
      c.className = 'confetti';
      c.style.left = Math.random() * 100 + '%';
      c.style.background = colors[Math.floor(Math.random() * colors.length)];
      c.style.animationDelay = Math.random() * 0.4 + 's';
      c.style.animationDuration = (0.8 + Math.random() * 0.6) + 's';
      wrap.appendChild(c);
    }
    container.appendChild(wrap);
    setTimeout(() => wrap.remove(), 2000);
  }

  function correct(idx) {
    const input = $('si' + idx);
    if (!input?.value.trim()) return toast('먼저 번역/영작을 입력해 주세요.');

    const btn = $(`sb${idx}b`);
    const loading = $('sl' + idx);
    const result = $('sr' + idx);
    const block = $('sb' + idx);
    btn.disabled = true;
    result.classList.remove('show');
    result.innerHTML = '';
    loading.classList.add('show');

    setTimeout(() => {
      loading.classList.remove('show');
      const text = input.value.trim();
      const pair = articles[day].content[idx];
      const g = grade(text, pair);

      let html = '';

      if (g.status === 'Perfect') {
        html += `<div class="s-perfect">
          <span class="s-perfect-icon">&#x2728;</span>
          <div class="s-perfect-text">
            <div class="s-perfect-label">Perfect!</div>
            <div class="s-perfect-score">${g.score}점 &mdash; 훌륭한 표현입니다!</div>
          </div>
        </div>`;
        spawnConfetti(block);
      } else if (g.status === 'Good') {
        html += `<div class="s-good">
          <span class="s-good-icon">&#x1f44d;</span>
          <div class="s-good-text">
            <div class="s-good-label">Good!</div>
            <div class="s-good-score">${g.score}점 &mdash; 좋은 표현입니다!</div>
          </div>
        </div>`;
      } else {
        html += `<div class="s-improve-head">
          <span class="s-improve-icon">&#x1f4dd;</span>
          <span class="s-improve-label">Needs Improvement</span>
          <span class="s-improve-score">${g.score}점</span>
        </div>`;
        if (g.diff) {
          html += `<div class="s-diff">
            <div class="s-diff-del">- ${esc(text)}</div>
            <div class="s-diff-add">+ ${esc(g.diff)}</div>
          </div>`;
        }
      }

      if (g.comments.length) {
        html += g.comments.map(c => `<div class="s-tip"><b>&#x1f4a1;</b>${esc(c)}</div>`).join('');
      }

      if (g.alternative && g.status !== 'Needs Improvement') {
        html += `<div class="s-alt"><b>&#x1f4ac;</b>더 자연스러운 표현: ${esc(g.alternative)}</div>`;
      }

      result.innerHTML = html;
      result.classList.add('show');
      btn.disabled = false;
      btn.classList.remove('pulse-pop');
      void btn.offsetWidth;
      btn.classList.add('pulse-pop');

      store.results[key(day, tab, idx)] = html;
      saveStore();
    }, 1200);
  }

  // ── Tooltip ──
  function hideTooltip() {
    const tip = $('tip');
    tip.classList.remove('show');
    tip.style.display = 'none';
  }

  function showTooltip(span, word, meaning) {
    tipWord = word;
    tipMeaning = meaning || '';

    $('tipW').textContent = word;
    $('tipArr').style.display = meaning ? '' : 'none';
    $('tipM').style.display = meaning ? '' : 'none';
    if (meaning) $('tipM').textContent = meaning;
    $('tipBtn').textContent = meaning ? '+ 단어장에 추가' : '+ 단어장에 추가 (단어만)';

    const tip = $('tip');
    const rect = span.getBoundingClientRect();
    let left = rect.left + rect.width / 2 - 120;
    let top = rect.bottom + 10;
    if (left < 10) left = 10;
    if (left + 260 > innerWidth) left = innerWidth - 270;
    if (top + 160 > innerHeight) top = rect.top - 140;

    tip.style.left = left + 'px';
    tip.style.top = top + 'px';
    tip.style.display = 'block';
    tip.classList.remove('show');
    void tip.offsetWidth;
    tip.classList.add('show');
  }

  // ── Vocab CRUD ──
  async function addToVocab() {
    hideTooltip();
    try {
      const { error } = await sb.from('vocabulary').insert({ word: tipWord, meaning: tipMeaning, context: '' });
      if (error) return toast('저장 실패: ' + error.message);
      toast(`"${tipWord}" 단어장에 추가`);
    } catch {
      toast('서버 연결 실패');
    }
  }

  async function loadVocab() {
    const list = $('vocabList');
    list.innerHTML = '<div class="v-empty">불러오는 중...</div>';
    try {
      const { data, error } = await sb.from('vocabulary').select('*').order('created_at', { ascending: false });
      if (error) return list.innerHTML = `<div class="v-empty">조회 실패: ${error.message}</div>`;
      if (!data?.length) return list.innerHTML = '<div class="v-empty">저장된 단어가 없습니다.<br>아티클에서 단어를 클릭하여 추가해 보세요.</div>';
      list.innerHTML = data.map(v => `
        <div class="v-item">
          <div class="v-info">
            <div class="v-word">${esc(v.word)}</div>
            <div class="v-mean">${esc(v.meaning)}</div>
            ${v.context ? `<div class="v-ctx">${esc(v.context)}</div>` : ''}
          </div>
          <button class="v-del" data-vid="${v.id}">삭제</button>
        </div>`).join('');
    } catch {
      list.innerHTML = '<div class="v-empty">서버에 연결할 수 없습니다.</div>';
    }
  }

  async function deleteVocab(id) {
    try {
      const { error } = await sb.from('vocabulary').delete().eq('id', id);
      if (error) return toast('삭제 실패: ' + error.message);
      toast('단어가 삭제되었습니다.');
      await loadVocab();
    } catch {
      toast('서버 연결 실패');
    }
  }

  function openVocab() { $('vocabOverlay').classList.add('show'); loadVocab(); }
  function closeVocab() { $('vocabOverlay').classList.remove('show'); }

  // ── Toast ──
  function toast(msg) {
    const t = $('toast');
    t.textContent = msg;
    t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 2500);
  }

  // ── Event Delegation ──
  function initEvents() {
    // 단어 클릭 → 툴팁
    document.addEventListener('click', e => {
      if (e.target.closest('.tooltip-btn') || e.target.closest('.tooltip')) return;
      const span = e.target.closest('.w');
      if (!span) return hideTooltip();
      const word = span.dataset.word;
      if (!word) return hideTooltip();
      const match = lookup(word);
      showTooltip(span, match?.word || word, match?.meaning || null);
    });

    // 사이드바
    $('sidebar').addEventListener('click', e => {
      const pill = e.target.closest('.pill');
      if (pill) selectDay(+pill.dataset.day);
    });

    // 탭 전환
    $('tabs').addEventListener('click', e => {
      const t = e.target.closest('.tab');
      if (t) switchTab(t.dataset.tab);
    });

    // 문장 입력 + AI 교정 (이벤트 위임)
    $('sentences').addEventListener('input', e => {
      const el = e.target.closest('.s-input');
      if (!el) return;
      autoResize(el);
      store.inputs[key(day, tab, +el.dataset.idx)] = el.value;
      saveStore();
    });

    $('sentences').addEventListener('click', e => {
      const btn = e.target.closest('[data-correct]');
      if (btn) correct(+btn.dataset.correct);
    });

    // 단어장 추가
    $('tipBtn').addEventListener('click', addToVocab);

    // 단어장 모달
    $('vocabOverlay').addEventListener('click', e => {
      if (e.target === $('vocabOverlay')) closeVocab();
      const del = e.target.closest('.v-del');
      if (del) deleteVocab(+del.dataset.vid);
    });

    $('vocabClose').addEventListener('click', closeVocab);
  }

  // ── Init ──
  async function init() {
    loadStore();
    initEvents();
    try {
      articles = await fetchArticles();
    } catch (e) {
      console.error('fetch error:', e);
      articles = [];
    }

    $('loader').classList.add('hide');
    $('hdr').style.display = '';
    $('app').style.display = '';

    if (!articles.length) {
      $('sidebar').innerHTML = '';
      $('meta').innerHTML = '<div style="text-align:center;padding:24px;color:var(--text-muted);font-size:13px">오늘의 아티클이 아직 준비되지 않았습니다.<br>매일 오전 7시에 새로운 기사가 업데이트됩니다.</div>';
      $('article').innerHTML = '';
      $('sentences').innerHTML = '';
      return;
    }
    renderAll();
  }

  init();

  return { openVocab, closeVocab };
})();
</script>
</body>
</html>
